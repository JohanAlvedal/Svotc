###############################################################################
## SVOTC Core v1 - 20_engine.yaml
## Single-engine design:
## 1) Initialize deterministic defaults at HA start.
## 2) Calculate requested/applied offset with strict priority order.
##
## Smart mode logic:
## - Comfort/overtemp guards have highest runtime priority.
## - Brake/prebrake overrides PI with price brake.
## - Neutral uses PI as base control.
## - Cheap uses PI as base control plus cheap boost.
##
## Changes from previous version:
##   REASON-1  brake and prebrake now share reason code PRICE_BRAKE.
##             forward_price_state still distinguishes them internally.
###############################################################################

automation:
  - id: svotc_core_v1_init
    alias: SVOTC Core v1 - Initialize defaults
    mode: single
    trigger:
      - platform: homeassistant
        event: start

    action:
      # Always start with clean hysteresis latches.
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.svotc_comfort_guard_latch
            - input_boolean.svotc_overtemp_latch
            - input_boolean.svotc_price_chain_active

      # Reset visible reason at startup so stale state is not shown after restart.
      - service: input_text.set_value
        target:
          entity_id: input_text.svotc_reason_code
        data:
          value: "INIT"

      # Reset internal PI memory at startup.
      # This avoids carrying old integral state after HA restart.
      - service: input_number.set_value
        target:
          entity_id: input_number.svotc_pi_integral_state
        data:
          value: 0

  - id: svotc_core_v1_engine
    alias: SVOTC Core v1 - Main engine
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"

      - platform: state
        entity_id:
          # React immediately to runtime state changes.
          # Config helpers (thresholds, offsets) are intentionally excluded —
          # the 1-min tick picks them up within one cycle.
          - input_select.svotc_mode
          - sensor.svotc_indoor_temperature
          - binary_sensor.svotc_inputs_healthy
          - sensor.svotc_forward_price_state
          - input_boolean.svotc_cheap_boost_enabled
          - input_number.svotc_cheap_boost_offset_c

    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.svotc_comfort_guard_latch') not in ['unknown', 'unavailable', 'none', 'None', '']
             and states('input_boolean.svotc_overtemp_latch') not in ['unknown', 'unavailable', 'none', 'None', '']
             and states('input_number.svotc_pi_integral_state') not in ['unknown', 'unavailable', 'none', 'None', ''] }}

    variables:
      #########################################################################
      # Core state
      #########################################################################
      mode: "{{ states('input_select.svotc_mode') }}"
      healthy: "{{ is_state('binary_sensor.svotc_inputs_healthy', 'on') }}"
      forward_price_state: "{{ states('sensor.svotc_forward_price_state') }}"

      indoor: >
        {% set s = states('sensor.svotc_indoor_temperature') %}
        {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
          {{ none }}
        {% else %}
          {{ s | float }}
        {% endif %}

      target: "{{ states('input_number.svotc_comfort_temperature') | float(21) }}"
      comfort_ready: "{{ indoor is not none }}"

      #########################################################################
      # Hysteresis thresholds
      #########################################################################
      comfort_on_delta: "{{ states('input_number.svotc_comfort_guard_activate_below_c') | float(0.8) }}"
      comfort_off_delta: "{{ states('input_number.svotc_comfort_guard_release_below_c') | float(0.4) }}"
      over_on_delta: "{{ states('input_number.svotc_overtemp_brake_activate_above_c') | float(0.8) }}"
      over_off_delta: "{{ states('input_number.svotc_overtemp_brake_release_above_c') | float(0.4) }}"

      comfort_latched: "{{ is_state('input_boolean.svotc_comfort_guard_latch', 'on') }}"
      over_latched: "{{ is_state('input_boolean.svotc_overtemp_latch', 'on') }}"

      comfort_should_on: "{{ indoor is not none and indoor <= (target - comfort_on_delta) }}"
      comfort_should_off: "{{ indoor is not none and indoor >= (target - comfort_off_delta) }}"
      over_should_on: "{{ indoor is not none and indoor >= (target + over_on_delta) }}"
      over_should_off: "{{ indoor is not none and indoor <= (target + over_off_delta) }}"

      comfort_active: >
        {{ comfort_should_on or (comfort_latched and not comfort_should_off) }}

      overtemp_active: >
        {{ over_should_on or (over_latched and not over_should_off) }}

      #########################################################################
      # Existing user-facing limits
      #########################################################################
      comfort_boost: "{{ states('input_number.svotc_comfort_boost_max_c') | float(1.0) }}"
      max_brake: "{{ states('input_number.svotc_brake_hold_offset_c') | float(4.0) }}"
      cheap_boost: "{{ states('input_number.svotc_cheap_boost_offset_c') | float(0.5) }}"
      cheap_enabled: "{{ is_state('input_boolean.svotc_cheap_boost_enabled', 'on') }}"

      #########################################################################
      # Hardcoded PI tuning
      #
      # PI overview:
      # - target - indoor > 0  => too cold  => controller should heat more
      # - target - indoor < 0  => too warm  => controller should brake more
      #
      # Sign convention in SVOTC:
      # - negative offset = more heat / preheat
      # - positive offset = more brake / less heat
      #
      # Tuning:
      # - pi_kp = proportional gain (reacts to current temp error)
      # - pi_ki = integral gain (reacts to accumulated temp error over time)
      # - pi_deadband = ignore small errors around target to reduce chatter
      #
      # Practical tuning hints:
      # - raise pi_kp a little if the house reacts too slowly
      # - lower pi_kp if it starts oscillating around target
      # - raise pi_ki a little if it stays too cold/warm for long periods
      # - lower pi_ki if it overshoots after long cheap/preheat periods
      # - raise pi_deadband slightly if control becomes too nervous near target
      #########################################################################
      pi_kp: 1.0 # Higher = faster response, too high can oscillate, pi_kp: 2.0
      pi_ki: 0.05 # Higher = stronger memory, too high can cause overshoot, pi_ki: 0.08
      pi_deadband: 0.25 # Ignore small temp errors close to target, pi_deadband: 0.15

      pi_i_prev: "{{ states('input_number.svotc_pi_integral_state') | float(0) }}"

      comfort_error_raw: >
        {% if indoor is not none %}
          {{ (target - indoor) | round(3) }}
        {% else %}
          0
        {% endif %}

      comfort_error_eff: >
        {% set e = comfort_error_raw | float(0) %}
        {% if indoor is none %}
          0
        {% elif e | abs <= (pi_deadband | float(0.25)) %}
          0
        {% else %}
          {{ e }}
        {% endif %}

      # PI is active in Comfort and Smart whenever indoor temperature exists.
      pi_control_enabled: >
        {{
          indoor is not none and
          (
            mode == 'Comfort' or
            mode == 'Smart'
          )
        }}

      pi_i_candidate: >
        {% set i_prev = pi_i_prev | float(0) %}
        {% set e = comfort_error_eff | float(0) %}
        {% if not pi_control_enabled %}
          {{ (i_prev * 0.85) | round(3) }}
        {% elif e == 0 %}
          {{ (i_prev * 0.95) | round(3) }}
        {% else %}
          {{ (i_prev + e) | round(3) }}
        {% endif %}

      pi_i_min: >
        {% set ki = pi_ki | float(0.05) %}
        {% if ki <= 0 %}
          -100
        {% else %}
          {{ ((-1 * max_brake) / ki) | round(3) }}
        {% endif %}

      pi_i_max: >
        {% set ki = pi_ki | float(0.05) %}
        {% if ki <= 0 %}
          100
        {% else %}
          {{ (comfort_boost / ki) | round(3) }}
        {% endif %}

      pi_i_new: >
        {% set x = pi_i_candidate | float(0) %}
        {% set lo = pi_i_min | float(-100) %}
        {% set hi = pi_i_max | float(100) %}
        {{ [hi, [x, lo] | max] | min | round(3) }}

      pi_p_term: >
        {{ (-1 * (pi_kp | float(1.0)) * (comfort_error_eff | float(0))) | round(3) }}

      pi_i_term: >
        {{ (-1 * (pi_ki | float(0.05)) * (pi_i_new | float(0))) | round(3) }}

      comfort_pi_requested: >
        {% if indoor is none %}
          0
        {% else %}
          {{ ((pi_p_term | float(0)) + (pi_i_term | float(0))) | round(2) }}
        {% endif %}

      comfort_pi_heat_only: >
        {% set raw = comfort_pi_requested | float(0) %}
        {{ [0, [raw, -1 * comfort_boost] | max] | min | round(2) }}

      comfort_pi_brake_only: >
        {% set raw = comfort_pi_requested | float(0) %}
        {{ [max_brake, [raw, 0] | max] | min | round(2) }}

      smart_pi_base: >
        {{ comfort_pi_requested | float(0) }}

      smart_pi_plus_cheap: >
        {{ ((smart_pi_base | float(0)) - cheap_boost) | round(2) }}

      #########################################################################
      # Main requested offset before final clamp
      #
      # Priority:
      # 1. Off
      # 2. Comfort mode -> full PI control
      # 3. Fail-safe if inputs unhealthy
      # 4. Comfort guard -> heat-only PI
      # 5. Overtemp guard -> brake-only PI
      # 6. Price brake / prebrake -> price override
      # 7. Cheap -> PI base + cheap boost
      # 8. Neutral -> PI base
      #########################################################################
      requested_unclamped: >
        {% if mode == 'Off' %}
          0
        {% elif mode == 'Comfort' and not comfort_ready %}
          0
        {% elif mode == 'Comfort' %}
          {{ comfort_pi_requested }}
        {% elif not healthy %}
          0
        {% elif comfort_active %}
          {{ comfort_pi_heat_only }}
        {% elif overtemp_active %}
          {{ comfort_pi_brake_only }}
        {% elif forward_price_state in ['brake', 'prebrake'] %}
          {{ max_brake }}
        {% elif forward_price_state == 'cheap' and cheap_enabled %}
          {{ smart_pi_plus_cheap }}
        {% else %}
          {{ smart_pi_base }}
        {% endif %}

      #########################################################################
      # Human-readable reason code
      #########################################################################
      reason: >
        {% if mode == 'Off' %}
          OFF
        {% elif mode == 'Comfort' and not comfort_ready %}
          COMFORT_SENSOR_MISSING
        {% elif mode == 'Comfort' and (comfort_pi_requested | float(0)) < 0 %}
          COMFORT_HEAT
        {% elif mode == 'Comfort' and (comfort_pi_requested | float(0)) > 0 %}
          COMFORT_BRAKE
        {% elif mode == 'Comfort' %}
          COMFORT_IDLE
        {% elif not healthy %}
          FAIL_SAFE
        {% elif comfort_active %}
          COMFORT_GUARD
        {% elif overtemp_active and (comfort_pi_brake_only | float(0)) > 0 %}
          OVERTEMP_PI_BRAKE
        {% elif overtemp_active %}
          OVERTEMP_STANDBY
        {% elif forward_price_state in ['brake', 'prebrake'] %}
          PRICE_BRAKE
        {% elif forward_price_state == 'cheap' and cheap_enabled and (smart_pi_plus_cheap | float(0)) < 0 %}
          CHEAP_PI_HEAT
        {% elif forward_price_state == 'cheap' and cheap_enabled and (smart_pi_plus_cheap | float(0)) > 0 %}
          CHEAP_PI_BRAKE
        {% elif forward_price_state == 'cheap' and cheap_enabled %}
          PRICE_CHEAP_IDLE
        {% elif (smart_pi_base | float(0)) < 0 %}
          SMART_PI_HEAT
        {% elif (smart_pi_base | float(0)) > 0 %}
          SMART_PI_BRAKE
        {% else %}
          NEUTRAL
        {% endif %}

      #########################################################################
      # Final clamp
      #########################################################################
      requested: >
        {% if mode == 'Comfort' %}
          {{ [5, [requested_unclamped | float(0), -5] | max] | min | round(2) }}
        {% else %}
          {{ [max_brake, [requested_unclamped | float(0), -1 * comfort_boost] | max] | min | round(2) }}
        {% endif %}

      #########################################################################
      # Ramp limiter
      #########################################################################
      current_requested: "{{ states('input_number.svotc_requested_offset_c') | float(0) }}"
      current_applied: "{{ states('input_number.svotc_applied_offset_c') | float(0) }}"
      current_reason: "{{ states('input_text.svotc_reason_code') }}"
      max_step: "{{ states('input_number.svotc_max_delta_per_step_c') | float(0.5) }}"
      delta: "{{ (requested | float(0)) - current_applied }}"
      step: "{{ [max_step, [delta, -1 * max_step] | max] | min }}"
      new_applied: "{{ (current_applied + step) | round(2) }}"

    action:
      #########################################################################
      # Maintain comfort latch in Smart mode
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ mode == 'Smart' and comfort_active and not comfort_latched }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.svotc_comfort_guard_latch

          - conditions:
              - condition: template
                value_template: "{{ mode == 'Smart' and (not comfort_active) and comfort_latched }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.svotc_comfort_guard_latch

      #########################################################################
      # Maintain overtemperature latch in Smart mode
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ mode == 'Smart' and overtemp_active and not over_latched }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.svotc_overtemp_latch

          - conditions:
              - condition: template
                value_template: "{{ mode == 'Smart' and (not overtemp_active) and over_latched }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.svotc_overtemp_latch

      #########################################################################
      # Store updated PI integral state only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ (pi_i_new | float(0)) != (pi_i_prev | float(0)) }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.svotc_pi_integral_state
                data:
                  value: "{{ pi_i_new }}"

      #########################################################################
      # Write requested offset only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (requested | float(0)) != current_requested }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.svotc_requested_offset_c
                data:
                  value: "{{ requested }}"

      #########################################################################
      # Write applied offset only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (new_applied | float(0)) != current_applied }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.svotc_applied_offset_c
                data:
                  value: "{{ new_applied }}"

      #########################################################################
      # Write reason code only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ reason != current_reason }}"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.svotc_reason_code
                data:
                  value: "{{ reason }}"

      #########################################################################
      # Keep price chain flag in sync with forward_price_state.
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ forward_price_state in ['brake', 'prebrake']
                     and not is_state('input_boolean.svotc_price_chain_active', 'on') }}
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.svotc_price_chain_active

          - conditions:
              - condition: template
                value_template: >
                  {{ forward_price_state not in ['brake', 'prebrake']
                     and is_state('input_boolean.svotc_price_chain_active', 'on') }}
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.svotc_price_chain_active

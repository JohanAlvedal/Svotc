###############################################################################
## SVOTC Core v1 - 20_engine.yaml
## Single-engine design:
## 1) Initialize deterministic defaults at HA start.
## 2) Calculate requested/applied offset with strict priority order.
##
###############################################################################

automation:
  - id: svotc_core_v1_init
    alias: SVOTC Core v1 - Initialize defaults
    mode: single
    trigger:
      - platform: homeassistant
        event: start

    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.svotc_reason_code
        data:
          value: "NEUTRAL"

      # Always start with clean hysteresis latches.
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.svotc_comfort_guard_latch
            - input_boolean.svotc_overtemp_latch

      # Reset user-visible offsets at startup for deterministic state.
      - service: input_number.set_value
        target:
          entity_id: input_number.svotc_requested_offset_c
        data:
          value: 0

      - service: input_number.set_value
        target:
          entity_id: input_number.svotc_applied_offset_c
        data:
          value: 0

      # Reset internal PI memory at startup.
      # This avoids carrying old integral state after HA restart.
      - service: input_number.set_value
        target:
          entity_id: input_number.svotc_pi_integral_state
        data:
          value: 0

  - id: svotc_core_v1_engine
    alias: SVOTC Core v1 - Main engine
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"

      - platform: state
        entity_id:
          - input_select.svotc_mode
          - sensor.svotc_indoor_temperature
          - input_number.svotc_comfort_temperature
          - input_number.svotc_max_delta_per_step_c
          - binary_sensor.svotc_inputs_healthy
          - sensor.svotc_forward_price_state
          - input_boolean.svotc_cheap_boost_enabled
          - input_number.svotc_comfort_guard_activate_below_c
          - input_number.svotc_comfort_guard_release_below_c
          - input_number.svotc_overtemp_brake_activate_above_c
          - input_number.svotc_overtemp_brake_release_above_c
          - input_number.svotc_comfort_boost_max_c
          - input_number.svotc_brake_hold_offset_c
          - input_number.svotc_cheap_boost_offset_c

    variables:
      #########################################################################
      # Core state
      #########################################################################
      mode: "{{ states('input_select.svotc_mode') }}"
      healthy: "{{ is_state('binary_sensor.svotc_inputs_healthy', 'on') }}"
      forward_price_state: "{{ states('sensor.svotc_forward_price_state') }}"

      indoor: >
        {% set s = states('sensor.svotc_indoor_temperature') %}
        {% if s in ['unknown', 'unavailable', 'none', 'None', ''] %}
          {{ none }}
        {% else %}
          {{ s | float }}
        {% endif %}

      target: "{{ states('input_number.svotc_comfort_temperature') | float(21) }}"
      comfort_ready: "{{ indoor is not none }}"

      #########################################################################
      # Hysteresis thresholds
      #
      # comfort_on_delta:
      #   How far below target indoor temp must fall before comfort guard starts.
      #
      # comfort_off_delta:
      #   Release threshold for comfort guard. Usually smaller than activate
      #   threshold to create hysteresis and prevent chatter.
      #
      # over_on_delta / over_off_delta:
      #   Same idea, but for overtemperature braking above target.
      #########################################################################
      comfort_on_delta: "{{ states('input_number.svotc_comfort_guard_activate_below_c') | float(0.8) }}"
      comfort_off_delta: "{{ states('input_number.svotc_comfort_guard_release_below_c') | float(0.4) }}"
      over_on_delta: "{{ states('input_number.svotc_overtemp_brake_activate_above_c') | float(0.8) }}"
      over_off_delta: "{{ states('input_number.svotc_overtemp_brake_release_above_c') | float(0.4) }}"

      comfort_latched: "{{ is_state('input_boolean.svotc_comfort_guard_latch', 'on') }}"
      over_latched: "{{ is_state('input_boolean.svotc_overtemp_latch', 'on') }}"

      comfort_should_on: "{{ indoor is not none and indoor <= (target - comfort_on_delta) }}"
      comfort_should_off: "{{ indoor is not none and indoor >= (target - comfort_off_delta) }}"
      over_should_on: "{{ indoor is not none and indoor >= (target + over_on_delta) }}"
      over_should_off: "{{ indoor is not none and indoor <= (target + over_off_delta) }}"

      comfort_active: >
        {{ comfort_should_on or (comfort_latched and not comfort_should_off) }}

      overtemp_active: >
        {{ over_should_on or (over_latched and not over_should_off) }}

      #########################################################################
      # Existing user-facing limits
      #
      # comfort_boost:
      #   Maximum negative offset allowed for heating boost.
      #   Negative SVOTC offset makes the heat pump think it is colder outside,
      #   which usually increases heating output.
      #
      # max_brake:
      #   Maximum positive offset allowed for braking.
      #   Positive SVOTC offset makes the heat pump think it is warmer outside,
      #   which usually reduces heating output.
      #
      # cheap_boost:
      #   Fixed negative boost used during cheap price periods in Smart mode.
      #########################################################################
      comfort_boost: "{{ states('input_number.svotc_comfort_boost_max_c') | float(1.0) }}"
      max_brake: "{{ states('input_number.svotc_brake_hold_offset_c') | float(4.0) }}"
      cheap_boost: "{{ states('input_number.svotc_cheap_boost_offset_c') | float(0.5) }}"
      cheap_enabled: "{{ is_state('input_boolean.svotc_cheap_boost_enabled', 'on') }}"

      #########################################################################
      # Hardcoded PI tuning for temperature control
      #
      # pi_kp = 2.0
      #   Proportional gain.
      #   Gives an immediate response to current temperature error.
      #   Example:
      #     house too cold by 1.0°C  -> about -2.0°C P contribution
      #     house too warm by 1.0°C  -> about +2.0°C P contribution
      #
      # pi_ki = 0.08
      #   Integral gain.
      #   Slowly accumulates remaining error over time to reduce steady-state
      #   drift. Kept intentionally low because the house + heat pump system
      #   is slow and can overshoot if I is too aggressive.
      #
      # pi_deadband = 0.15°C
      #   Small neutral zone around target.
      #   Prevents tiny sensor fluctuations from constantly changing the offset.
      #
      # No derivative term is used:
      # - Indoor temperature sensors can be noisy
      # - The building is already a slow thermal filter
      # - Simplicity and robustness are preferred here
      #########################################################################
      pi_kp: 2.0
      pi_ki: 0.08
      pi_deadband: 0.15

      #########################################################################
      # PI state memory
      #
      # This is the integral "memory" stored in an input_number helper.
      # Without this, PI would behave like P-only because HA templates do not
      # retain previous state automatically between runs.
      #########################################################################
      pi_i_prev: "{{ states('input_number.svotc_pi_integral_state') | float(0) }}"

      #########################################################################
      # Temperature error
      #
      # error > 0  => house is too cold  => SVOTC should go negative (heat more)
      # error < 0  => house is too warm  => SVOTC should go positive (brake more)
      #########################################################################
      comfort_error_raw: >
        {% if indoor is not none %}
          {{ (target - indoor) | round(3) }}
        {% else %}
          0
        {% endif %}

      comfort_error_eff: >
        {% set e = comfort_error_raw | float(0) %}
        {% if indoor is none %}
          0
        {% elif e | abs <= (pi_deadband | float(0.15)) %}
          0
        {% else %}
          {{ e }}
        {% endif %}

      #########################################################################
      # PI activation
      #
      # PI is active when:
      # - Comfort mode is selected, or
      # - Smart mode has entered comfort recovery, or
      # - Smart mode has entered overtemperature braking
      #
      # Outside those cases, price logic remains in charge and the integrator
      # is slowly decayed toward zero.
      #########################################################################
      pi_control_enabled: >
        {{
          indoor is not none and
          (
            mode == 'Comfort' or
            comfort_active or
            overtemp_active
          )
        }}

      #########################################################################
      # Integral update
      #
      # Behavior:
      # - If PI is inactive, decay toward zero to avoid stale memory
      # - If error is inside deadband, also decay slowly
      # - Otherwise accumulate error
      #
      # This acts like a soft anti-memory reset without being abrupt.
      #########################################################################
      pi_i_candidate: >
        {% set i_prev = pi_i_prev | float(0) %}
        {% set e = comfort_error_eff | float(0) %}
        {% if not pi_control_enabled %}
          {{ (i_prev * 0.85) | round(3) }}
        {% elif e == 0 %}
          {{ (i_prev * 0.95) | round(3) }}
        {% else %}
          {{ (i_prev + e) | round(3) }}
        {% endif %}

      #########################################################################
      # Integral clamp (anti-windup)
      #
      # Prevents the integrator from building up unrealistic stored error.
      #
      # Limits are derived from existing user limits:
      # - positive integral side is bounded by comfort_boost
      # - negative integral side is bounded by max_brake
      #
      # This keeps I-term roughly aligned with what the system is actually
      # allowed to output.
      #########################################################################
      pi_i_min: >
        {% set ki = pi_ki | float(0.08) %}
        {% if ki <= 0 %}
          -100
        {% else %}
          {{ ((-1 * max_brake) / ki) | round(3) }}
        {% endif %}

      pi_i_max: >
        {% set ki = pi_ki | float(0.08) %}
        {% if ki <= 0 %}
          100
        {% else %}
          {{ (comfort_boost / ki) | round(3) }}
        {% endif %}

      pi_i_new: >
        {% set x = pi_i_candidate | float(0) %}
        {% set lo = pi_i_min | float(-100) %}
        {% set hi = pi_i_max | float(100) %}
        {{ [hi, [x, lo] | max] | min | round(3) }}

      #########################################################################
      # PI terms
      #
      # Sign convention:
      # - negative output = heating boost
      # - positive output = braking
      #
      # Therefore the regulator output is inverted from the raw temperature
      # error, because:
      # - cold house  -> positive error -> negative offset wanted
      # - warm house  -> negative error -> positive offset wanted
      #########################################################################
      pi_p_term: >
        {{ (-1 * (pi_kp | float(2.0)) * (comfort_error_eff | float(0))) | round(3) }}

      pi_i_term: >
        {{ (-1 * (pi_ki | float(0.08)) * (pi_i_new | float(0))) | round(3) }}

      comfort_pi_requested: >
        {% if indoor is none %}
          0
        {% else %}
          {{ ((pi_p_term | float(0)) + (pi_i_term | float(0))) | round(2) }}
        {% endif %}

      #########################################################################
      # PI variants used in Smart mode
      #
      # comfort_pi_heat_only:
      #   Used when comfort guard is active.
      #   Only negative values are allowed, because the purpose is to recover
      #   warmth, not brake.
      #
      # comfort_pi_brake_only:
      #   Used when overtemperature braking is active.
      #   Only positive values are allowed, because the purpose is to reduce
      #   heating, not boost it.
      #########################################################################
      comfort_pi_heat_only: >
        {% set raw = comfort_pi_requested | float(0) %}
        {{ [0, [raw, -1 * comfort_boost] | max] | min | round(2) }}

      comfort_pi_brake_only: >
        {% set raw = comfort_pi_requested | float(0) %}
        {{ [max_brake, [raw, 0] | max] | min | round(2) }}

      #########################################################################
      # Main requested offset before final clamp
      #
      # Priority:
      # 1. Off / PassThrough
      # 2. Comfort mode -> full PI control
      # 3. Fail-safe if inputs unhealthy
      # 4. Comfort guard -> heat-only PI
      # 5. Overtemp guard -> brake-only PI
      # 6. Price brake / prebrake / hold
      # 7. Cheap boost
      # 8. Neutral
      #########################################################################
      requested_unclamped: >
        {% if mode == 'Off' %}
          0
        {% elif mode == 'PassThrough' %}
          0
        {% elif mode == 'Comfort' and not comfort_ready %}
          0
        {% elif mode == 'Comfort' %}
          {{ comfort_pi_requested }}
        {% elif not healthy %}
          0
        {% elif comfort_active %}
          {{ comfort_pi_heat_only }}
        {% elif overtemp_active %}
          {{ comfort_pi_brake_only }}
        {% elif forward_price_state in ['brake', 'prebrake', 'hold'] %}
          {{ max_brake }}
        {% elif forward_price_state == 'cheap' and cheap_enabled %}
          {{ -1 * cheap_boost }}
        {% else %}
          0
        {% endif %}

      #########################################################################
      # Human-readable reason code
      #########################################################################
      reason: >
        {% if mode == 'Off' %}
          OFF
        {% elif mode == 'PassThrough' %}
          PASS_THROUGH
        {% elif mode == 'Comfort' and not comfort_ready %}
          COMFORT_SENSOR_MISSING
        {% elif mode == 'Comfort' and (comfort_pi_requested | float(0)) < 0 %}
          COMFORT_HEAT
        {% elif mode == 'Comfort' and (comfort_pi_requested | float(0)) > 0 %}
          COMFORT_BRAKE
        {% elif mode == 'Comfort' %}
          COMFORT_IDLE
        {% elif not healthy %}
          FAIL_SAFE
        {% elif comfort_active %}
          COMFORT_GUARD
        {% elif overtemp_active and (comfort_pi_brake_only | float(0)) > 0 %}
          OVERTEMP_PI_BRAKE
        {% elif overtemp_active %}
          OVERTEMP_BRAKE
        {% elif forward_price_state == 'brake' %}
          PRICE_BRAKE
        {% elif forward_price_state == 'prebrake' %}
          PRICE_PREBRAKE
        {% elif forward_price_state == 'hold' %}
          PRICE_HOLD
        {% elif forward_price_state == 'cheap' and cheap_enabled %}
          PRICE_CHEAP
        {% else %}
          NEUTRAL
        {% endif %}

      #########################################################################
      # Final clamp
      #
      # Comfort mode:
      #   Allowed to regulate symmetrically between -5 and +5.
      #   This keeps Comfort mode independent from the Smart-mode helper limits.
      #
      # Smart mode:
      #   Uses existing user-defined limits:
      #   - lower bound = -comfort_boost
      #   - upper bound = max_brake
      #########################################################################
      requested: >
        {% if mode == 'Comfort' %}
          {{ [5, [requested_unclamped | float(0), -5] | max] | min | round(2) }}
        {% else %}
          {{ [max_brake, [requested_unclamped | float(0), -1 * comfort_boost] | max] | min | round(2) }}
        {% endif %}

      #########################################################################
      # Ramp limiter
      #
      # max_step:
      #   Maximum allowed change in applied offset per engine cycle.
      #   This prevents sudden jumps and makes the system smoother and gentler
      #   on the heat pump behavior.
      #########################################################################
      current_requested: "{{ states('input_number.svotc_requested_offset_c') | float(0) }}"
      current_applied: "{{ states('input_number.svotc_applied_offset_c') | float(0) }}"
      current_reason: "{{ states('input_text.svotc_reason_code') }}"
      max_step: "{{ states('input_number.svotc_max_delta_per_step_c') | float(0.5) }}"
      delta: "{{ (requested | float(0)) - current_applied }}"
      step: "{{ [max_step, [delta, -1 * max_step] | max] | min }}"
      new_applied: "{{ (current_applied + step) | round(2) }}"

    action:
      #########################################################################
      # Maintain comfort latch in Smart mode
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ mode != 'Comfort' and comfort_active and not comfort_latched }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.svotc_comfort_guard_latch

          - conditions:
              - condition: template
                value_template: "{{ mode != 'Comfort' and (not comfort_active) and comfort_latched }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.svotc_comfort_guard_latch

      #########################################################################
      # Maintain overtemperature latch in Smart mode
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ mode != 'Comfort' and overtemp_active and not over_latched }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.svotc_overtemp_latch

          - conditions:
              - condition: template
                value_template: "{{ mode != 'Comfort' and (not overtemp_active) and over_latched }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.svotc_overtemp_latch

      #########################################################################
      # Store updated PI integral state only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (pi_i_new | float(0)) != (pi_i_prev | float(0)) }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.svotc_pi_integral_state
                data:
                  value: "{{ pi_i_new }}"

      #########################################################################
      # Write requested offset only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (requested | float(0)) != current_requested }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.svotc_requested_offset_c
                data:
                  value: "{{ requested }}"

      #########################################################################
      # Write applied offset only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ (new_applied | float(0)) != current_applied }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.svotc_applied_offset_c
                data:
                  value: "{{ new_applied }}"

      #########################################################################
      # Write reason code only when it has changed
      #########################################################################
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ reason != current_reason }}"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.svotc_reason_code
                data:
                  value: "{{ reason }}"

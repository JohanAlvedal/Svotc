###############################################################################
##  SVOTC – 10_sensors.yaml
##  @2.0.0-beta
##
##  All template sensors and binary sensors.
##  No service calls here — purely reactive/computed.
##
##  Dependency order (bottom depends on top):
##    entity_price → P30/P80 → raw_price_state → TTN/NEAR
##    entity_indoor/outdoor → src_indoor/outdoor → comfort_guard_active
##    applied_offset + src_outdoor → virtual_outdoor_temperature
###############################################################################

template:

  ###########################################################################
  ## @A  SOURCE SENSORS — validate + range-guard raw entity values
  ###########################################################################
  - sensor:
      - name: "SVOTC Src Indoor"
        unique_id: svotc_src_indoor
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set ent = states('input_text.svotc_entity_indoor') %}
          {% if ent in ['unknown','unavailable','none',''] %}
            {{ none }}
          {% else %}
            {% set v = states(ent) | float(none) %}
            {{ v | round(2) if v is not none and 10 <= v <= 35 else none }}
          {% endif %}
        availability: >
          {% set ent = states('input_text.svotc_entity_indoor') %}
          {{ ent not in ['unknown','unavailable','none','']
             and (states(ent) | float(none)) is not none }}

      - name: "SVOTC Src Outdoor"
        unique_id: svotc_src_outdoor
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set ent = states('input_text.svotc_entity_outdoor') %}
          {% if ent in ['unknown','unavailable','none',''] %}
            {{ none }}
          {% else %}
            {% set v = states(ent) | float(none) %}
            {{ v | round(2) if v is not none and -50 <= v <= 50 else none }}
          {% endif %}
        availability: >
          {% set ent = states('input_text.svotc_entity_outdoor') %}
          {{ ent not in ['unknown','unavailable','none','']
             and (states(ent) | float(none)) is not none }}

      - name: "SVOTC Src Current Price"
        unique_id: svotc_src_current_price
        unit_of_measurement: "SEK/kWh"
        state_class: measurement
        state: >
          {% set ent = states('input_text.svotc_entity_price') %}
          {% if ent in ['unknown','unavailable','none',''] %}
            {{ none }}
          {% else %}
            {% set p = states(ent) | float(none) %}
            {{ p | round(3) if p is not none and -2 <= p <= 20 else none }}
          {% endif %}
        availability: >
          {% set ent = states('input_text.svotc_entity_price') %}
          {{ ent not in ['unknown','unavailable','none','']
             and (states(ent) | float(none)) is not none }}

      - name: "SVOTC Dynamic target temperature"
        unique_id: svotc_dynamic_target_temperature
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {{ states('input_number.svotc_comfort_temperature') | float(21) | round(2) }}

  ###########################################################################
  ## @B  RAW PRICE STATE — momentary classification (no dwell)
  ##     cheap | neutral | brake | off
  ##     Used only by FSM automation as input. Never used directly by engine.
  ###########################################################################
  - sensor:
      - name: "SVOTC Raw price state"
        unique_id: svotc_raw_price_state
        state: >
          {% set mode = states('input_select.svotc_mode') %}
          {% if mode in ['Off','PassThrough','ComfortOnly'] %}
            off
          {% else %}
            {% set p   = states('sensor.svotc_src_current_price') | float(none) %}
            {% set p30 = states('sensor.svotc_p30') | float(none) %}
            {% set p80 = states('sensor.svotc_p80') | float(none) %}
            {% set floor = states('input_number.svotc_price_floor_sek') | float(0.10) %}
            {% if p is none or p30 is none or p80 is none %}
              neutral
            {% elif p > p80 and p > floor %}
              brake
            {% elif p < p30 %}
              cheap
            {% else %}
              neutral
            {% endif %}
          {% endif %}

  ###########################################################################
  ## @C  PERCENTILES — P30 / P80 from raw_today (96 blocks)
  ##     Trigger: every 5 min + HA start + price entity change.
  ##     Uses raw_today only (today's distribution is the reference).
  ##     Requires ≥ 12 data points to avoid skew late in day.
  ###########################################################################
  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: input_text.svotc_entity_price
    sensor:
      - name: "SVOTC P30"
        unique_id: svotc_p30
        unit_of_measurement: "SEK/kWh"
        state_class: measurement
        state: >
          {% set ent = states('input_text.svotc_entity_price') %}
          {% if ent in ['unknown','unavailable','none',''] %}
            {{ none }}
          {% else %}
            {% set source = state_attr(ent, 'raw_today') | default([], true) %}
            {% set ns = namespace(prices=[]) %}
            {% for it in source %}
              {% if it is mapping %}
                {% set v = it.get('value') | float(none) %}
                {% if v is not none %}
                  {% set ns.prices = ns.prices + [v] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.prices | length >= 12 %}
              {% set srt = ns.prices | sort %}
              {% set idx = ((srt | length - 1) * 0.30) | round(0, 'floor') | int %}
              {{ srt[idx] | round(3) }}
            {% else %}
              {{ none }}
            {% endif %}
          {% endif %}

      - name: "SVOTC P80"
        unique_id: svotc_p80
        unit_of_measurement: "SEK/kWh"
        state_class: measurement
        state: >
          {% set ent = states('input_text.svotc_entity_price') %}
          {% if ent in ['unknown','unavailable','none',''] %}
            {{ none }}
          {% else %}
            {% set source = state_attr(ent, 'raw_today') | default([], true) %}
            {% set ns = namespace(prices=[]) %}
            {% for it in source %}
              {% if it is mapping %}
                {% set v = it.get('value') | float(none) %}
                {% if v is not none %}
                  {% set ns.prices = ns.prices + [v] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.prices | length >= 12 %}
              {% set srt = ns.prices | sort %}
              {% set idx = ((srt | length - 1) * 0.80) | round(0, 'floor') | int %}
              {{ srt[idx] | round(3) }}
            {% else %}
              {{ none }}
            {% endif %}
          {% endif %}

  ###########################################################################
  ## @D  FORWARD LOOK — TTN (time to next brake) + NEAR (bridge threshold)
  ##     Trigger: every 1 min + HA start + dependency changes.
  ##     Scans today + tomorrow (raw_tomorrow available from ~13:00).
  ##     Returns 999 when no future brake/near block found.
  ###########################################################################
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.svotc_p80
          - sensor.svotc_p30
          - input_text.svotc_entity_price
          - input_number.svotc_price_floor_sek
    sensor:
      - name: "SVOTC Minutes to next brake start"
        unique_id: svotc_minutes_to_next_brake_start
        unit_of_measurement: "min"
        state_class: measurement
        availability: >
          {% set ent = states('input_text.svotc_entity_price') %}
          {{ ent not in ['unknown','unavailable','none','']
             and states('sensor.svotc_p80') not in ['unknown','unavailable','none'] }}
        state: >
          {% set ent   = states('input_text.svotc_entity_price') %}
          {% set p80   = states('sensor.svotc_p80') | float(none) %}
          {% set floor = states('input_number.svotc_price_floor_sek') | float(0.10) %}
          {% if ent in ['unknown','unavailable','none',''] or p80 is none %}
            999
          {% else %}
            {% set today    = state_attr(ent, 'raw_today')    | default([], true) %}
            {% set tomorrow = state_attr(ent, 'raw_tomorrow') | default([], true) %}
            {% set blocks   = today + tomorrow %}
            {% set now_ts   = as_timestamp(now()) %}
            {% set ns = namespace(best=none, in_brake=false) %}

            {# Check if currently in a brake block #}
            {% for it in blocks %}
              {% if it is mapping %}
                {% set v = it.get('value') | float(none) %}
                {% set s = it.get('start') | as_timestamp(none) %}
                {% set e = it.get('end')   | as_timestamp(none) %}
                {% if v is not none and s is not none and e is not none
                      and s <= now_ts < e and v > p80 and v > floor %}
                  {% set ns.in_brake = true %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if ns.in_brake %}
              0
            {% else %}
              {% for it in blocks %}
                {% if it is mapping %}
                  {% set v = it.get('value') | float(none) %}
                  {% set s = it.get('start') | as_timestamp(none) %}
                  {% if v is not none and s is not none and s > now_ts
                        and v > p80 and v > floor %}
                    {% set mins = (s - now_ts) / 60 %}
                    {% if ns.best is none or mins < ns.best %}
                      {% set ns.best = mins %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.best | round(1) if ns.best is not none else 999 }}
            {% endif %}
          {% endif %}

      - name: "SVOTC Minutes to next near start"
        unique_id: svotc_minutes_to_next_near_start
        unit_of_measurement: "min"
        state_class: measurement
        availability: >
          {% set ent = states('input_text.svotc_entity_price') %}
          {{ ent not in ['unknown','unavailable','none','']
             and states('sensor.svotc_p80') not in ['unknown','unavailable','none']
             and states('sensor.svotc_p30') not in ['unknown','unavailable','none'] }}
        state: >
          {% set ent   = states('input_text.svotc_entity_price') %}
          {% set p80   = states('sensor.svotc_p80') | float(none) %}
          {% set p30   = states('sensor.svotc_p30') | float(none) %}
          {% set floor = states('input_number.svotc_price_floor_sek') | float(0.10) %}
          {% if ent in ['unknown','unavailable','none',''] or p80 is none or p30 is none %}
            999
          {% else %}
            {% set span = [p80 - p30, 0] | max %}
            {% if span < 0.02 %}
              {# Flat price profile — bridge-hold not meaningful #}
              999
            {% else %}
              {# NEAR threshold: top 25% of span below P80 #}
              {% set near_raw = p80 - (span * 0.25) %}
              {% set near     = [near_raw, floor] | max %}
              {% if near >= p80 * 0.999 %}
                999
              {% else %}
                {% set today    = state_attr(ent, 'raw_today')    | default([], true) %}
                {% set tomorrow = state_attr(ent, 'raw_tomorrow') | default([], true) %}
                {% set blocks   = today + tomorrow %}
                {% set now_ts   = as_timestamp(now()) %}
                {% set ns = namespace(best=none, in_near=false) %}

                {% for it in blocks %}
                  {% if it is mapping %}
                    {% set v = it.get('value') | float(none) %}
                    {% set s = it.get('start') | as_timestamp(none) %}
                    {% set e = it.get('end')   | as_timestamp(none) %}
                    {% if v is not none and s is not none and e is not none
                          and s <= now_ts < e and v > near %}
                      {% set ns.in_near = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}

                {% if ns.in_near %}
                  0
                {% else %}
                  {% for it in blocks %}
                    {% if it is mapping %}
                      {% set v = it.get('value') | float(none) %}
                      {% set s = it.get('start') | as_timestamp(none) %}
                      {% if v is not none and s is not none and s > now_ts and v > near %}
                        {% set mins = (s - now_ts) / 60 %}
                        {% if ns.best is none or mins < ns.best %}
                          {% set ns.best = mins %}
                        {% endif %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.best | round(1) if ns.best is not none else 999 }}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %}

  ###########################################################################
  ## @E  PREBRAKE SENSORS
  ###########################################################################
  - sensor:
      - name: "SVOTC Prebrake window (min)"
        unique_id: svotc_prebrake_window_min
        unit_of_measurement: "min"
        state_class: measurement
        state: >
          {% set mode = states('input_select.svotc_mode') %}
          {% set base = 30 if mode == 'Simple'
             else (states('input_number.svotc_prebrake_lead_time_min') | float(0)) %}
          {% set outdoor = states('sensor.svotc_src_outdoor') | float(0) %}
          {% set thermal = states('input_number.svotc_thermal_mass_factor') | float(1.0) %}
          {% set temp_factor = 1.0 %}
          {% if outdoor < -10 %}
            {% set temp_factor = 1.3 %}
          {% elif outdoor < 0 %}
            {% set temp_factor = 1.15 %}
          {% elif outdoor > 10 %}
            {% set temp_factor = 0.85 %}
          {% endif %}
          {{ (base * thermal * temp_factor) | round(0) | int }}

      - name: "SVOTC Prebrake strength"
        unique_id: svotc_prebrake_strength
        state_class: measurement
        state: >
          {% set window    = states('sensor.svotc_prebrake_window_min') | float(0) %}
          {% set mins      = states('sensor.svotc_minutes_to_next_brake_start') | float(999) %}
          {% set hold      = states('input_number.svotc_brake_hold_offset_c') | float(6) %}
          {% set full_lead = 0.0 if hold < 8 else 5.0 %}
          {% set denom     = window - full_lead %}
          {% if window > 0 and mins <= window and denom > 0 %}
            {% set x = (window - mins) / denom %}
            {{ ([[x, 0] | max, 1] | min) | round(3) }}
          {% else %}
            0
          {% endif %}

  ###########################################################################
  ## @F  OUTPUT SENSOR — virtual outdoor temperature (sent to heat pump)
  ###########################################################################
  - sensor:
      - name: "SVOTC Virtual outdoor temperature"
        unique_id: svotc_virtual_outdoor_temperature
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set out = states('sensor.svotc_src_outdoor') | float(none) %}
          {% set off = states('input_number.svotc_applied_offset_c') | float(0) %}
          {% if out is not none %}
            {% set x = out + off %}
            {{ ([[x, -50] | max, 50] | min) | round(2) }}
          {% else %}
            {{ none }}
          {% endif %}
        availability: >
          {{ states('sensor.svotc_src_outdoor') not in ['unknown','unavailable','none',''] }}

  ###########################################################################
  ## @G  BINARY SENSORS
  ###########################################################################
  - binary_sensor:
      - name: "SVOTC Inputs healthy"
        unique_id: svotc_inputs_healthy
        state: >
          {{ states('sensor.svotc_src_indoor')  not in ['unknown','unavailable','none','']
             and states('sensor.svotc_src_outdoor') not in ['unknown','unavailable','none',''] }}

      - name: "SVOTC Price schema ok"
        unique_id: svotc_price_schema_ok
        state: >
          {% set ent = states('input_text.svotc_entity_price') %}
          {% if ent in ['unknown','unavailable','none',''] %}
            false
          {% else %}
            {% set rt = state_attr(ent, 'raw_today') %}
            {% if rt is not iterable or rt is string or (rt | list | length) == 0 %}
              false
            {% else %}
              {% set ns = namespace(ok=true) %}
              {% set check_count = [rt | list | length, 3] | min %}
              {% for i in range(check_count) %}
                {% set x = (rt | list)[i] %}
                {% if not (x is mapping and 'value' in x and 'start' in x and 'end' in x) %}
                  {% set ns.ok = false %}
                {% endif %}
              {% endfor %}
              {{ ns.ok and (rt | list | length) >= 12 }}
            {% endif %}
          {% endif %}

      - name: "SVOTC Price available"
        unique_id: svotc_price_available
        state: >
          {# Lighter check: entity exists and current price is a valid number.
             Schema structure is validated separately by svotc_price_schema_ok. #}
          {% set ent = states('input_text.svotc_entity_price') %}
          {{ ent not in ['unknown','unavailable','none','']
             and (states(ent) | float(none)) is not none }}

  ###########################################################################
  ## @H  COMFORT GUARD — trigger-based for hysteresis correctness
  ##     Triggers on all inputs that affect guard decision + /5 min heartbeat
  ##     to recover from HA restart without waiting for a state change.
  ###########################################################################
  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.svotc_src_indoor
          - sensor.svotc_dynamic_target_temperature
          - input_boolean.svotc_comfort_guard_enabled
          - input_number.svotc_comfort_guard_activate_below_c
          - input_number.svotc_comfort_guard_deactivate_above_c
          - input_select.svotc_mode
    binary_sensor:
      - name: "SVOTC Comfort guard active"
        unique_id: svotc_comfort_guard_active
        state: >
          {% set enabled = is_state('input_boolean.svotc_comfort_guard_enabled','on') %}
          {% if not enabled %}
            false
          {% else %}
            {% set mode   = states('input_select.svotc_mode') %}
            {% set indoor = states('sensor.svotc_src_indoor') | float(none) %}
            {% set target = states('sensor.svotc_dynamic_target_temperature') | float(none) %}
            {% set act_delta = 0.8 if mode == 'Simple'
               else (states('input_number.svotc_comfort_guard_activate_below_c') | float(1.0)) %}
            {% set rel_delta = 0.3 if mode == 'Simple'
               else (states('input_number.svotc_comfort_guard_deactivate_above_c') | float(0.4)) %}
            {# Safety: release threshold must be strictly less than activate threshold #}
            {% set rel_delta = [rel_delta, act_delta - 0.1] | min %}
            {% set was_on = this.state == 'on' %}
            {% if indoor is none or target is none %}
              {{ was_on }}
            {% elif was_on %}
              {{ indoor < (target - rel_delta) }}
            {% else %}
              {{ indoor < (target - act_delta) }}
            {% endif %}
          {% endif %}
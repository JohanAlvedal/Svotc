###############################################################################
##  SVOTC – 30_learning.yaml
##  @2.0.1
##
##  Three automations:
##
##  1. svotc_learning_comfort_violations
##     Increments comfort_violations_24h each time comfort guard activates.
##
##  2. svotc_learning_reset_daily  (00:00:00)
##     Adjusts learned_brake_efficiency based on yesterday's violations.
##     Logic:
##       > 5 violations → reduce efficiency −0.05  (brake was too aggressive)
##       > 2 violations → reduce efficiency −0.02
##         1 violation  → no change (acceptable)
##         0 violations → increase efficiency +0.01  (small, conservative)
##     Efficiency range: [0.5, 1.0]. Max 1.0 means learning never makes
##     braking MORE aggressive than the user's hold_offset setting.
##
##     Thermal mass factor:
##       > 5 violations → INCREASE +0.1  (house needs longer ramps/holds)
##       > 2 violations → INCREASE +0.05
##         0 violations → DECREASE −0.05 (ramps can be slightly shorter)
##     This is intentionally the OPPOSITE sign from efficiency: more violations
##     means the house is slow to recover, so we increase thermal_mass to
##     give it more prebrake/ramp time. NOT decreased.
##
##  3. svotc_auto_tune_defaults  (/10 min)
##     Derives brake timing parameters from hold_offset + thermal_mass_factor.
##     Only runs when learning_enabled = ON.
##     Writes: max_delta, rampup, hold_min, rampdown, dwell_neutral_to_brake,
##             dwell_others, bridge_window.
##     Does NOT write comfort_temperature or brake_hold_offset (user-owned).
##
##  4. svotc_startup_initialization
##     Runs once on HA start/reload when svotc_initialized = OFF.
##     Writes safe defaults, then sets initialized = ON.
##
##  Changelog:
##    FIX-16 (2.0.1): svotc_comfort_boost_max_c init value corrected from
##           3.0 to 0.8 °C — aligns with documentation ("keep ≤ 1.0").
##           The old 3°C default caused indoor over-heating during cheap
##           periods on all new installations.
###############################################################################

automation:
  ##############################################################################
  ## @1  COMFORT VIOLATION COUNTER
  ##############################################################################
  - alias: "SVOTC Learning: comfort violation counter"
    id: svotc_learning_comfort_violations
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.svotc_comfort_guard_active
        to: "on"
    action:
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_comfort_violations_24h }
        data:
          value: >
            {{ (states('input_number.svotc_comfort_violations_24h') | float(0) + 1)
               | round(0) | int }}

  ##############################################################################
  ## @2  DAILY LEARNING RESET
  ##############################################################################
  - alias: "SVOTC Learning: daily reset and adjustment"
    id: svotc_learning_reset_daily
    mode: single
    trigger:
      - platform: time
        at: "00:00:00"
    # KRIT-2 FIX: guard against HA restart at 23:59:58 race condition.
    # startup_initialization resets violations=0 and then writes eff=1.0,
    # which would override the daily reset result. By requiring initialized=on
    # we ensure init has fully completed before we read violations.
    condition:
      - condition: state
        entity_id: input_boolean.svotc_initialized
        state: "on"
    action:
      - variables:
          violations: "{{ states('input_number.svotc_comfort_violations_24h') | float(0) }}"
          current_eff: "{{ states('input_number.svotc_learned_brake_efficiency') | float(1.0) }}"
          current_thermal: "{{ states('input_number.svotc_thermal_mass_factor') | float(1.0) }}"
          learning_on: "{{ is_state('input_boolean.svotc_learning_enabled','on') }}"

      - choose:
          - conditions: "{{ not learning_on }}"
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.svotc_comfort_violations_24h }
                data: { value: 0 }
              - stop: "Learning disabled — only resetting counter"

      # KRIT-3 FIX: sanity-check for stuck/faulty sensor.
      # A healthy system should never produce > 48 guard activations per day
      # (that would mean guard toggling every 30 min continuously).
      # If violations > 48 it almost certainly indicates a stuck or oscillating
      # indoor sensor rather than genuine brake aggressiveness. Skip learning
      # adjustment and log a warning instead to alert the user.
      - choose:
          - conditions: "{{ violations > 48 }}"
            sequence:
              - action: system_log.write
                data:
                  level: warning
                  logger: homeassistant.components.automation.svotc
                  message: >
                    SVOTC SENSOR_FAULT suspected: {{ violations | int }} comfort
                    violations today (threshold: 48). Skipping learning adjustment.
                    Check sensor.svotc_src_indoor for stuck or oscillating value.
              - action: input_number.set_value
                target: { entity_id: input_number.svotc_comfort_violations_24h }
                data: { value: 0 }
              - stop: "Possible sensor fault — learning adjustment skipped"

      # ── Adjust brake efficiency ───────────────────────────────────────────
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_learned_brake_efficiency }
        data:
          value: >
            {% set eff = current_eff %}
            {% if violations > 5 %}
              {% set x = eff - 0.05 %}
            {% elif violations > 2 %}
              {% set x = eff - 0.02 %}
            {% elif violations == 0 %}
              {% set x = eff + 0.01 %}
            {% else %}
              {# 1–2 violations: acceptable, no change #}
              {% set x = eff %}
            {% endif %}
            {{ ([[x, 0.5] | max, 1.0] | min) | round(2) }}

      # ── Adjust thermal mass factor ────────────────────────────────────────
      # NOTE: more violations → INCREASE thermal_mass (house is slow to recover,
      # needs longer ramp/hold windows). Zero violations → allow small decrease.
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_thermal_mass_factor }
        data:
          value: >
            {% set t = current_thermal %}
            {% if violations > 5 %}
              {% set x = t + 0.10 %}
            {% elif violations > 2 %}
              {% set x = t + 0.05 %}
            {% elif violations == 0 %}
              {% set x = t - 0.05 %}
            {% else %}
              {% set x = t %}
            {% endif %}
            {{ ([[x, 0.5] | max, 1.5] | min) | round(2) }}

      # ── Reset daily counter ───────────────────────────────────────────────
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_comfort_violations_24h }
        data: { value: 0 }

  ##############################################################################
  ## @3  AUTO-TUNE — derive timing parameters from hold_offset + thermal_mass
  ##     Only runs when learning_enabled = ON and mode is Smart or Simple.
  ##     All derived values are clamped to safe ranges.
  ##############################################################################
  - alias: "SVOTC Auto-tune"
    id: svotc_auto_tune_defaults
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/10"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_number.svotc_brake_hold_offset_c
          - input_number.svotc_thermal_mass_factor
        for: "00:00:10"
    condition:
      - condition: state
        entity_id: input_boolean.svotc_initialized
        state: "on"
      - condition: state
        entity_id: input_boolean.svotc_learning_enabled
        state: "on"
      - condition: template
        value_template: >
          {{ states('input_select.svotc_mode') in ['Smart','Simple'] }}
    action:
      - variables:
          hold: "{{ states('input_number.svotc_brake_hold_offset_c') | float(4.0) }}"
          thermal: "{{ states('input_number.svotc_thermal_mass_factor') | float(1.0) }}"

          # Prebrake window (read from sensor, already scaled by thermal + temp)
          window: "{{ states('sensor.svotc_prebrake_window_min') | float(25) }}"

          # full_lead: portion of prebrake window where offset is already at hold
          # (only relevant when hold is very large, disabled for normal hold ≤ 8)
          full_lead: "{{ 0.0 }}"

          # Build time: prebrake ramp time available before brake starts
          build_min: "{{ [window - full_lead, 1] | max }}"

          # max_delta: must be able to ramp from 0 to hold_offset in build_min
          # steps (each step = 30 s = 0.5 min → build_min * 2 steps)
          max_delta_calc: >
            {% set steps = (build_min | float(1)) * 2 %}
            {% set x = hold / steps %}
            {{ ([[x, 0.10] | max, 0.50] | min) | round(2) }}
            {# Capped at 0.50 — above that, changes are perceptible to the pump #}

          # Ramp-up: must complete within one 15-min price block (hard max 14 min)
          rampup_calc: >
            {% set x = 8 * thermal %}
            {{ ([[x, 4] | max, 14] | min) | round(0) | int }}

          # Hold minimum: symmetric with ramp-up
          holdmin_calc: >
            {% set x = 8 * thermal %}
            {{ ([[x, 4] | max, 14] | min) | round(0) | int }}

          # Ramp-down: can be longer than ramp-up (soft landing)
          rampdown_calc: >
            {% set x = 12 * thermal %}
            {{ ([[x, 8] | max, 30] | min) | round(0) | int }}

          # Dwell neutral→brake: Ngenic-style ≥ 10 min for 15-min data
          dwell_ntob_calc: >
            {% set x = 10 * thermal %}
            {{ ([[x, 10] | max, 20] | min) | round(0) | int }}

          # Dwell brake→neutral: ≥ 15 min to prevent yo-yo on alternating blocks
          dwell_bton_calc: >
            {% set x = 15 * thermal %}
            {{ ([[x, 15] | max, 25] | min) | round(0) | int }}

          # Other dwells (cheap↔neutral): shorter, less critical
          dwell_other_calc: >
            {% set x = 5 * thermal %}
            {{ ([[x, 4] | max, 10] | min) | round(0) | int }}

          # Bridge-hold window
          bridge_calc: >
            {% set x = 45 * thermal %}
            {{ ([[x, 30] | max, 90] | min) | round(0) | int }}

      - action: input_number.set_value
        target: { entity_id: input_number.svotc_max_delta_per_step_c }
        data: { value: "{{ max_delta_calc }}" }

      - action: input_number.set_value
        target: { entity_id: input_number.svotc_brake_rampup_duration_min }
        data: { value: "{{ rampup_calc }}" }

      - action: input_number.set_value
        target: { entity_id: input_number.svotc_brake_hold_duration_min }
        data: { value: "{{ holdmin_calc }}" }

      - action: input_number.set_value
        target: { entity_id: input_number.svotc_brake_rampdown_duration_min }
        data: { value: "{{ rampdown_calc }}" }

      - action: input_number.set_value
        target:
          { entity_id: input_number.svotc_price_dwell_neutral_to_brake_min }
        data: { value: "{{ dwell_ntob_calc }}" }

      - action: input_number.set_value
        target:
          { entity_id: input_number.svotc_price_dwell_brake_to_neutral_min }
        data: { value: "{{ dwell_bton_calc }}" }

      - action: input_number.set_value
        target:
          entity_id:
            - input_number.svotc_price_dwell_cheap_to_neutral_min
            - input_number.svotc_price_dwell_neutral_to_cheap_min
        data: { value: "{{ dwell_other_calc }}" }

      - action: input_number.set_value
        target: { entity_id: input_number.svotc_bridge_hold_window_min }
        data: { value: "{{ bridge_calc }}" }

  ##############################################################################
  ## @4  STARTUP INITIALIZATION
  ##     Runs when svotc_initialized = OFF (new install or manual reset).
  ##     Sets all parameters to safe Ngenic-style defaults, then sets
  ##     initialized = ON so it doesn't run again on next restart.
  ##############################################################################
  - alias: "SVOTC Startup initialization"
    id: svotc_startup_initialization
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.svotc_initialized') != 'on' }}
    action:
      # Comfort
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_comfort_temperature }
        data: { value: 21.0 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_comfort_guard_activate_below_c }
        data: { value: 1 }
      - action: input_number.set_value
        target:
          { entity_id: input_number.svotc_comfort_guard_deactivate_above_c }
        data: { value: 0.5 }
      # FIX-16 (2.0.1): corrected from 3.0 to 0.8 — matches documentation in
      # 00_helpers.yaml ("Default 0.8 °C", "keep ≤ 1.0 to avoid over-heating").
      # The old value of 3°C could cause significant indoor over-heating during
      # cheap periods on all new installations.
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_comfort_boost_max_c }
        data: { value: 0.8 }

      # Cheap boost option (NEW)
      # Default ON. If you prefer default OFF, replace turn_on with turn_off.
      - action: input_boolean.turn_on
        target: { entity_id: input_boolean.svotc_cheap_boost_enabled }

      # Price / brake
      #   - action: input_number.set_value
      #     target: { entity_id: input_number.svotc_brake_hold_offset_c }
      #     data:   { value: 10.0 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_price_floor_sek }
        data: { value: 0.10 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_prebrake_lead_time_min }
        data: { value: 25 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_bridge_hold_window_min }
        data: { value: 45 }

      # Dwell
      - action: input_number.set_value
        target:
          { entity_id: input_number.svotc_price_dwell_neutral_to_brake_min }
        data: { value: 10 }
      - action: input_number.set_value
        target:
          { entity_id: input_number.svotc_price_dwell_brake_to_neutral_min }
        data: { value: 15 }
      - action: input_number.set_value
        target:
          entity_id:
            - input_number.svotc_price_dwell_cheap_to_neutral_min
            - input_number.svotc_price_dwell_neutral_to_cheap_min
        data: { value: 5 }

      # Brake timing
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_brake_rampup_duration_min }
        data: { value: 8 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_brake_hold_duration_min }
        data: { value: 8 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_brake_rampdown_duration_min }
        data: { value: 12 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_max_delta_per_step_c }
        data: { value: 0.20 }

      # Thermal / learning
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_thermal_mass_factor }
        data: { value: 1.0 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_learned_brake_efficiency }
        data: { value: 1.0 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_comfort_violations_24h }
        data: { value: 0 }

      # System state
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_requested_offset_c }
        data: { value: 0 }
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_applied_offset_c }
        data: { value: 0 }
      - action: input_text.set_value
        target: { entity_id: input_text.svotc_reason_code }
        data: { value: "INIT" }

      # Mark as initialized
      - action: input_boolean.turn_on
        target: { entity_id: input_boolean.svotc_initialized }

      - action: system_log.write
        data:
          level: info
          logger: custom_components.svotc
          message: "SVOTC v2.0.1: Startup initialization complete."

###############################################################################
##  SVOTC – 22_engine.yaml
##  @2.1.3
##
##  Offset composition (all terms in °C):
##
##    comfort_term   — negative (boost heating) when comfort guard is active
##                     active. Capped by comfort_boost_max.
##                     Dominant over price brake except during overheat guard.
##
##    cheap_term     — negative (pre-heat) during cheap price state.
##                     Ngenic-style: load-shift heating INTO cheap periods.
##                     Uses same comfort_boost_max cap as a depth limit.
##                     Zero when guard is active (guard already boosting).
##                     Can be disabled via input_boolean.svotc_cheap_boost_enabled.
##
##    price_term     — positive (brake) during brake phase (ramping_up /
##                     holding / ramping_down) and during prebrake.
##                     Computed from phase FSM + elapsed time.
##                     Zero when comfort guard is active.
##
##    overtemp_term  — positive (extra brake) when indoor > target + deadband.
##                     Adds up to max_auto above price_term, but total
##                     requested is clamped to hold_offset (no over-shoot).
##
##    overheat_term  — positive (full brake) when overheat_guard is active.
##                     Overrides all other terms. Rate-limited via next_applied.
##
##  requested_calc = comfort_term + cheap_term + price_term + overtemp_term
##  Clamped: [req_min, hold_offset] when positive, [req_min, 0] when only
##           negative terms are active. Final hard clamp to [req_min, req_max].
##
##  Learning behaviour (brake efficiency + cap):
##
##    Users may set a large brake depth (e.g. 15–20°C), but adaptive learning
##    should not be able to "eat" the entire braking authority.
##
##    Therefore hold_offset is computed with a learning cap:
##
##      base = brake_hold_offset_c (Smart) or spread-proportional (Simple, FIX-24)
##      eff  = learned_brake_efficiency (0.5–1.0 when learning enabled)
##      cap  = learning_cap_c (default 10°C)
##
##      protected = max(0, base - cap)        (NOT affected by learning)
##      learnable = min(base, cap)            (affected by eff)
##
##      hold_offset = protected + learnable * eff
##
##    Example:
##      base=20°C, cap=10°C, eff=0.60  => hold_offset = 10 + 10*0.60 = 16°C
##
##  Rate limiting: applied_offset tracks requested at max max_delta_per_step_c
##  per 30-second tick, giving smooth ramps without step-changes.
##
##  Freeze behaviour: if price data becomes unavailable while braking,
##  applied_offset ramps down toward 0 at max_delta/tick rather than
##  snapping. Negative offsets are held (cheap/comfort boost is safe to keep).
##
##    FIX-TICK (2.1.0): Periodic ticker changed from 30 s to 60 s.
##           Halves engine invocations during idle/ramp. Ramp resolution
##           unchanged — auto-tune max_delta_calc divisor updated from
##           * 2 to * 1 in 30_learning.yaml to compensate.
##           Throttle guard threshold updated from 28 s to 58 s.
##    FIX-23 (2.1.2): hold_offset split into hold_offset (price-responsive)
##           and hold_offset_fixed (always 3.0 in Simple, = hold_offset in
##           Smart). overheat_term now uses hold_offset_fixed so the overheat
##           comfort guard is not price-proportional in Simple mode.
##    FIX-24 (2.1.2): Simple mode hold_offset is now proportional to how
##           expensive the current price is relative to today's price spread:
##             excess = price - P80
##             span   = P80 - P30  (today's price range)
##             scale  = clamp(excess / span, 0, 1)
##             hold   = base + max_add * scale   (base=3°C, max_add=5°C)
##           Result: 3°C at P80, up to 8°C at extreme prices. Falls back to
##           3°C when P30/P80/price are unavailable (null-guard). Defrost cap
##           (FIX-22, svotc_defrost_virt_max_c) still applies on top.
##    FIX-25 (2.1.3): comfort_term remains active during brake when comfort
##           guard is ON (unless overheat guard is active), preserving
##           comfort-priority behavior in both Smart and Simple modes.
###############################################################################

automation:
  - alias: "SVOTC Engine"
    id: svotc_engine
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - input_select.svotc_mode
          - input_text.svotc_brake_phase
          - input_text.svotc_last_price_state
          - binary_sensor.svotc_comfort_guard_active
          - binary_sensor.svotc_overheat_guard_active
          - input_boolean.svotc_comfort_guard_enabled
          - input_boolean.svotc_learning_enabled
          - input_boolean.svotc_cheap_boost_enabled
          - input_number.svotc_brake_hold_offset_c
          - input_number.svotc_comfort_boost_max_c
          - input_number.svotc_max_delta_per_step_c
          - input_number.svotc_learned_brake_efficiency
          - input_number.svotc_learning_cap_c
          - input_number.svotc_defrost_virt_max_c
          # FIX-TRIGGER (2.0.2): price_available REMOVED from this list.
          # It is handled exclusively by the debounced trigger below.
          - binary_sensor.svotc_price_schema_ok
      # FIX-TRIGGER (2.0.2): sole trigger for price_available — 1 min debounce
      # prevents sawtooth pattern in applied_offset during unstable Nordpool
      # API connections (WEAK-5 FIX retained, duplicate trigger eliminated).
      - platform: state
        entity_id: binary_sensor.svotc_price_available
        for: "00:01:00"

    # ── BUG-3 FIX: Do not run before startup initialization is complete ───
    condition:
      - condition: state
        entity_id: input_boolean.svotc_initialized
        state: "on"

    action:
      # ── Throttle guard — skip if called faster than 30 s ─────────────────
      - variables:
          last_run_ts: "{{ as_timestamp(states('input_datetime.svotc_engine_last_run'), default=0) }}"
          now_ts: "{{ as_timestamp(now()) }}"
          since_last_s: "{{ now_ts - last_run_ts }}"

      - choose:
          - conditions: "{{ since_last_s < 58 }}"
            sequence:
              - stop: "Throttled — engine ran {{ since_last_s | round(0) }} s ago"

      # ── Stamp last-run immediately to avoid double-fire ───────────────────
      - action: input_datetime.set_datetime
        target: { entity_id: input_datetime.svotc_engine_last_run }
        data: { datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}" }

      # ── Gather all inputs ─────────────────────────────────────────────────
      - variables:
          mode: "{{ states('input_select.svotc_mode') }}"
          healthy: "{{ is_state('binary_sensor.svotc_inputs_healthy','on') }}"
          indoor: "{{ states('sensor.svotc_src_indoor') | float(none) }}"
          target: "{{ states('sensor.svotc_dynamic_target_temperature') | float(none) }}"
          pre: "{{ states('sensor.svotc_prebrake_strength') | float(0) }}"
          price_state: "{{ states('input_text.svotc_last_price_state') }}"
          schema_ok: "{{ is_state('binary_sensor.svotc_price_schema_ok','on') }}"
          price_ok: "{{ is_state('binary_sensor.svotc_price_available','on') }}"
          learning_enabled: "{{ is_state('input_boolean.svotc_learning_enabled','on') }}"
          cheap_boost_enabled: "{{ is_state('input_boolean.svotc_cheap_boost_enabled','on') }}"

          guard: >
            {{ is_state('binary_sensor.svotc_comfort_guard_active','on')
               and is_state('input_boolean.svotc_comfort_guard_enabled','on') }}

          overheat: >
            {{ is_state('binary_sensor.svotc_overheat_guard_active','on')
               and is_state('input_boolean.svotc_comfort_guard_enabled','on') }}

          force_instant: "{{ mode in ['Off','PassThrough'] }}"

          hold_offset: >
            {% if mode == 'Simple' %}
              {# FIX-24 (2.1.2): spread-proportional hold for Simple.
                 Formula: base + max_add * clamp((price-P80)/(P80-P30), 0, 1)
                 Gives 3°C at P80, up to 8°C at extreme prices.
                 Falls back to base=3°C when price/P30/P80 unavailable.
                 Null-guard: span < 0.02 (flat-price day) → scale = 0. #}
              {% set p_now  = states('sensor.svotc_src_current_price') | float(none) %}
              {% set p30_v  = states('sensor.svotc_p30') | float(none) %}
              {% set p80_v  = states('sensor.svotc_p80') | float(none) %}
              {% set simple_base    = 3.0 %}
              {% set simple_max_add = 5.0 %}
              {% if p_now is not none and p30_v is not none and p80_v is not none %}
                {% set span = p80_v - p30_v %}
                {% if span >= 0.02 %}
                  {% set excess = p_now - p80_v %}
                  {% set scale  = [[excess / span, 0] | max, 1] | min %}
                  {% set raw    = simple_base + (simple_max_add * scale) %}
                  {% set pre_defrost = ([raw, simple_base] | max) %}
                {% else %}
                  {# Flat-price day: spread too small, use base #}
                  {% set pre_defrost = simple_base %}
                {% endif %}
              {% else %}
                {# Missing data: safe fallback #}
                {% set pre_defrost = simple_base %}
              {% endif %}
              {# FIX-22 (2.1.2): defrost cap — virtual_outdoor must not
                 exceed svotc_defrost_virt_max_c when outdoor is cold.
                 outdoor | float(0) is the conservative fallback: if outdoor
                 sensor fails, assume 0°C → cap = dvmax (full protection). #}
              {% set dvmax   = states('input_number.svotc_defrost_virt_max_c') | float(8.0) %}
              {% set outdoor = states('sensor.svotc_src_outdoor') | float(0) %}
              {% if outdoor < dvmax %}
                {{ [pre_defrost, [dvmax - outdoor, 0] | max] | min | round(2) }}
              {% else %}
                {{ pre_defrost | round(2) }}
              {% endif %}
            {% else %}
              {% set base = states('input_number.svotc_brake_hold_offset_c') | float(4.0) %}
              {% set eff  = 1.0 if not learning_enabled
                 else ([[states('input_number.svotc_learned_brake_efficiency') | float(1.0), 0.5] | max, 1.0] | min) %}
              {% set cap_raw = states('input_number.svotc_learning_cap_c') | float(10.0) %}
              {% set cap = [[cap_raw, 0] | max, base] | min %}
              {% set protected = [base - cap, 0] | max %}
              {% set learnable = [base, cap] | min %}
              {% set pre_defrost = (protected + (learnable * eff)) %}
              {# FIX-22 (2.1.2): defrost cap — applied after learning.
                 Physical constraint overrides user preference and learning.
                 outdoor | float(0): conservative fallback if sensor fails. #}
              {% set dvmax   = states('input_number.svotc_defrost_virt_max_c') | float(8.0) %}
              {% set outdoor = states('sensor.svotc_src_outdoor') | float(0) %}
              {% if outdoor < dvmax %}
                {{ [pre_defrost, [dvmax - outdoor, 0] | max] | min | round(2) }}
              {% else %}
                {{ pre_defrost | round(2) }}
              {% endif %}
            {% endif %}

          # FIX-23 (2.1.2): hold_offset_fixed is always the non-proportional
          # preset — 3.0°C in Simple, identical to hold_offset in Smart.
          # Used exclusively by overheat_term so the overheat comfort guard
          # is never price-proportional (it is a safety feature, not a price
          # control feature). All other terms use hold_offset.
          hold_offset_fixed: >
            {% if mode == 'Simple' %}
              3.0
            {% else %}
              {{ hold_offset }}
            {% endif %}

          boost_max: >
            {{ 0.8 if mode == 'Simple'
               else (states('input_number.svotc_comfort_boost_max_c') | float(0.8)) }}

          max_delta: >
            {{ 0.10 if mode == 'Simple'
               else (states('input_number.svotc_max_delta_per_step_c') | float(0.20)) }}

          req_min: "{{ state_attr('input_number.svotc_requested_offset_c','min') | float(-10) }}"
          req_max: "{{ state_attr('input_number.svotc_requested_offset_c','max') | float(20) }}"
          app_min: "{{ state_attr('input_number.svotc_applied_offset_c','min') | float(-10) }}"
          app_max: "{{ state_attr('input_number.svotc_applied_offset_c','max') | float(20) }}"

          p30_valid: "{{ states('sensor.svotc_p30') not in ['unknown','unavailable','none',''] }}"
          p80_valid: "{{ states('sensor.svotc_p80') not in ['unknown','unavailable','none',''] }}"
          price_ready: "{{ price_ok and schema_ok and p30_valid and p80_valid }}"

          freeze_price: >
            {{ healthy
               and mode in ['Smart','Simple']
               and not guard
               and not price_ready
               and pre == 0 }}

          phase: "{{ states('input_text.svotc_brake_phase') }}"
          in_brake_phase: "{{ phase in ['ramping_up','holding','ramping_down'] }}"

          phase_ts: >
            {{ as_timestamp(states('input_datetime.svotc_brake_phase_changed'), default=none) }}
          elapsed_min: >
            {% if phase_ts is number %}
              {{ ((as_timestamp(now()) - phase_ts) / 60) | round(2) }}
            {% else %}
              0
            {% endif %}

          rampup_min: "{{ states('input_number.svotc_brake_rampup_duration_min')  | float(8) }}"
          rampdown_min: "{{ states('input_number.svotc_brake_rampdown_duration_min') | float(12) }}"

          # ── TERM: comfort ───────────────────────────────────────────────
          # FIX-COMFORT-OVERHEAT (2.0.2): Explicitly zero when overheat is
          # active. Prevents contradictory state in ComfortOnly mode where
          # comfort_term (-boost_max) and overheat_term (+hold_offset) were
          # both non-zero, producing a confusing net offset.
          comfort_term: >
            {% if mode in ['Off','PassThrough'] %}
              0
            {% elif overheat %}
              0
            {% elif guard %}
              {{ -boost_max | round(3) }}
            {% else %}
              0
            {% endif %}

          # ── TERM: cheap ─────────────────────────────────────────────────
          cheap_term: >
            {% if mode not in ['Smart','Simple'] %}
              0
            {% elif not cheap_boost_enabled %}
              0
            {% elif guard %}
              0
            {% elif not price_ready %}
              0
            {% elif in_brake_phase %}
              0
            {% elif price_state == 'cheap' %}
              {{ -boost_max | round(3) }}
            {% else %}
              0
            {% endif %}

          # ── TERM: price (brake + prebrake) ──────────────────────────────
          price_term: >
            {% if mode not in ['Smart','Simple'] %}
              0
            {% elif guard %}
              0
            {% elif not price_ready %}
              0
            {% else %}
              {% set ramp_term = 0 %}
              {% if phase == 'ramping_up' %}
                {% if phase_ts is not number %}
                  {% set ramp_term = 0 %}
                {% elif rampup_min <= 0 %}
                  {% set ramp_term = hold_offset %}
                {% else %}
                  {% set x = ([[elapsed_min / rampup_min, 0] | max, 1] | min) %}
                  {% set ramp_term = (hold_offset * x) | round(3) %}
                {% endif %}
              {% endif %}

              {% set pre_term = 0 %}
              {% if pre > 0 %}
                {% set x = ([[pre, 0] | max, 1] | min) %}
                {% set pre_term = (hold_offset * x) | round(3) %}
              {% endif %}

              {% if phase == 'ramping_up' %}
                {{ [ramp_term, pre_term] | max }}
              {% elif pre > 0 and not in_brake_phase %}
                {{ pre_term }}
              {% elif phase == 'holding' %}
                {{ hold_offset | round(3) }}
              {% elif phase == 'ramping_down' %}
                {% if phase_ts is not number %}
                  0
                {% elif rampdown_min <= 0 %}
                  0
                {% else %}
                  {% set x = ([[1 - (elapsed_min / rampdown_min), 0] | max, 1] | min) %}
                  {{ (hold_offset * x) | round(3) }}
                {% endif %}
              {% else %}
                0
              {% endif %}
            {% endif %}

          # ── TERM: overtemp ──────────────────────────────────────────────
          overtemp_term: >
            {% if mode not in ['Smart','Simple'] %}
              0
            {% elif guard %}
              0
            {% elif indoor is none or target is none %}
              0
            {% else %}
              {% set over      = indoor - target %}
              {% set deadband   = 0.15 %}
              {% set full_scale = 1.00 %}
              {% if over <= deadband %}
                0
              {% else %}
                {% set x = ([[( over - deadband) / (full_scale - deadband), 0] | max, 1] | min) %}
                {% set cap = [hold_offset, 5.0] | min %}
                {{ (cap * x) | round(3) }}
              {% endif %}
            {% endif %}

          # ── TERM: overheat ──────────────────────────────────────────────
          overheat_term: >
            {% if mode not in ['Smart','Simple','ComfortOnly'] %}
              0
            {% elif not overheat %}
              0
            {% elif indoor is none or target is none %}
              0
            {% else %}
              {# FIX-23 (2.1.2): use hold_offset_fixed, not hold_offset.
                 Overheat guard is a safety feature — its strength must not
                 vary with the current spot price in Simple mode. #}
              {{ hold_offset_fixed | round(3) }}
            {% endif %}

          # ── REQUESTED offset ─────────────────────────────────────────────
          requested_calc: >
            {% set x = (comfort_term   | float(0))
                     + (cheap_term     | float(0))
                     + (price_term     | float(0))
                     + (overtemp_term  | float(0))
                     + (overheat_term  | float(0)) %}
            {% set pos_cap = [hold_offset | float(0), req_max] | min %}
            {% set x_clamped = ([[x, req_min] | max, pos_cap] | min) %}
            {{ x_clamped | round(2) }}

          requested: >
            {% if freeze_price %}
              {% set prev = states('input_number.svotc_applied_offset_c') | float(0) %}
              {% if prev > 0 %}
                0
              {% else %}
                {{ requested_calc | float(0) }}
              {% endif %}
            {% elif mode == 'Off' %}
              0
            {% elif mode == 'PassThrough' %}
              0
            {% elif mode == 'ComfortOnly' %}
              {{ (comfort_term | float(0)) | round(2) }}
            {% else %}
              {{ requested_calc | float(0) }}
            {% endif %}

          # ── APPLIED offset (rate limited) ────────────────────────────────
          prev_applied: "{{ states('input_number.svotc_applied_offset_c') | float(0) }}"
          delta: "{{ (requested | float(0)) - prev_applied }}"

          next_applied: >
            {% set req  = requested    | float(0) %}
            {% set prev = prev_applied | float(0) %}
            {% set d    = delta        | float(0) %}
            {% set md   = max_delta    | float(0.20) %}

            {% if force_instant %}
              {% set x = 0.0 %}
            {% elif freeze_price and prev > 0 %}
              {% set x = [prev - md, 0] | max %}
            {% elif d > md %}
              {% set x = prev + md %}
            {% elif d < -md %}
              {% set x = prev - md %}
            {% else %}
              {% set x = req %}
            {% endif %}
            {{ ([[x, app_min] | max, app_max] | min) | round(2) }}

          # ── REASON CODE ──────────────────────────────────────────────────
          # FIX-22 (2.1.2): detect when defrost cap is actively limiting
          # hold_offset. Used to surface DEFROST_CAP reason code.
          defrost_active: >
            {% set dvmax   = states('input_number.svotc_defrost_virt_max_c') | float(8.0) %}
            {% set outdoor = states('sensor.svotc_src_outdoor') | float(0) %}
            {% if outdoor < dvmax %}
              {% if mode == 'Simple' %}
                {% set p_now = states('sensor.svotc_src_current_price') | float(none) %}
                {% set p30_v = states('sensor.svotc_p30') | float(none) %}
                {% set p80_v = states('sensor.svotc_p80') | float(none) %}
                {% set uncapped = 3.0 %}
                {% if p_now is not none and p30_v is not none and p80_v is not none %}
                  {% set span = p80_v - p30_v %}
                  {% if span >= 0.02 %}
                    {% set scale = [[((p_now - p80_v) / span), 0] | max, 1] | min %}
                    {% set uncapped = 3.0 + 5.0 * scale %}
                  {% endif %}
                {% endif %}
                {{ uncapped > (dvmax - outdoor) }}
              {% else %}
                {% set base = states('input_number.svotc_brake_hold_offset_c') | float(4.0) %}
                {{ base > (dvmax - outdoor) }}
              {% endif %}
            {% else %}
              false
            {% endif %}

          reason: >-
            {% if mode == 'Off' %}
              OFF
            {% elif mode == 'PassThrough' %}
              PASS_THROUGH
            {% elif not healthy %}
              MISSING_INPUTS_FREEZE
            {% elif not schema_ok %}
              PRICE_SCHEMA_INVALID
            {% elif overheat %}
              OVERHEAT_GUARD
            {% elif guard %}
              COMFORT_GUARD
            {% elif mode == 'ComfortOnly' %}
              COMFORT_ONLY
            {% elif freeze_price %}
              PRICE_DATA_FREEZE
            {% elif cheap_term | float(0) < -0.05 %}
              PRICE_CHEAP_BOOST
            {% elif pre > 0 and mode in ['Smart','Simple'] %}
              PRICE_PREBRAKE
            {% elif overtemp_term | float(0) > 0.05 %}
              OVERTEMP_BRAKE
            {% elif phase in ['ramping_up','holding','ramping_down'] %}
              {% if defrost_active %}
                PRICE_BRAKE_DEFROST_CAP
              {% else %}
                PRICE_BRAKE
              {% endif %}
            {% else %}
              NEUTRAL
            {% endif %}

      # ── Hard stop if inputs are not healthy ───────────────────────────────
      - choose:
          - conditions: "{{ not healthy }}"
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.svotc_requested_offset_c }
                data: { value: 0 }
              - action: input_number.set_value
                target: { entity_id: input_number.svotc_applied_offset_c }
                data: { value: 0 }
              - action: input_text.set_value
                target: { entity_id: input_text.svotc_reason_code }
                data: { value: "MISSING_INPUTS_FREEZE" }
              - stop: "Inputs not healthy — offset frozen at 0"

      # ── Write outputs ─────────────────────────────────────────────────────
      - action: input_number.set_value
        target: { entity_id: input_number.svotc_requested_offset_c }
        data: { value: "{{ requested | float(0) }}" }

      - action: input_number.set_value
        target: { entity_id: input_number.svotc_applied_offset_c }
        data: { value: "{{ next_applied | float(0) }}" }

      - action: input_text.set_value
        target: { entity_id: input_text.svotc_reason_code }
        data: { value: "{{ reason | trim }}" }

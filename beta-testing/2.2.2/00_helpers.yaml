###############################################################################
##  SVOTC – 00_helpers.yaml
##  @2.1.3
##
##  All input_* helpers: UI controls, system state, timestamps, flags.
##  Nothing here executes logic — purely declarative.
##
##  Notes:
##  - Brake depth is configured with svotc_brake_hold_offset_c.
##  - Adaptive learning may reduce braking via svotc_learned_brake_efficiency
##    (0.5–1.0), but only up to svotc_learning_cap_c (default 10°C).
##    Any brake depth above the cap remains "protected" and is not reduced.
##
##  Changelog:
##    FIX-23 (2.1.3): svotc_initialized no longer forces initial: false.
##           Lets Home Assistant restore state across restart so startup
##           defaults are not reapplied after first successful initialization.
##    FIX-24 (2.1.3): Percentile cache fallback window extended to 4 hours
##           (coordinated with 10_sensors.yaml) to bridge midnight data gaps
##           on 15-minute Nordpool feeds.
##    FIX-19 (2.1.2): svotc_brake_hold_offset_c max reduced 15 → 10°C.
##           High offsets risk breaking the heat pump's defrost logic and
##           cause excessively long drain times. Hard max 10°C enforced here;
##           22_engine.yaml also clamps base to 10 as a second safety layer.
##    FIX-20 (2.1.2): svotc_bridge_hold_window_min max reduced 180 → 60 min.
##           Default also corrected to 20 min (was 45). A window > 60 min
##           causes the system to bridge separate price peaks as one
##           continuous brake, holding a high offset for hours unnecessarily.
##           Recommended: 20 min (covers one 15-min Nordpool gap + margin).
##    FIX-22 (2.1.2): Added svotc_defrost_virt_max_c. Caps the virtual
##           outdoor temperature to prevent the heat pump from receiving a
##           signal that could disrupt defrost cycles when outdoor is cold.
##           Default 8°C: if outdoor < 8°C, hold_offset is capped so that
##           virtual_outdoor ≤ svotc_defrost_virt_max_c.
###############################################################################

input_select:
  ###########################################################################
  ## MODE
  ###########################################################################
  svotc_mode:
    name: "SVOTC Mode"
    options: ["Off", "Smart", "Simple", "PassThrough", "ComfortOnly"]
    # Off          – System disabled, offset forced to 0
    # Smart        – Full automatic (comfort + price + learning)
    # Simple       – Ngenic-style conservative presets, no user tuning needed
    # PassThrough  – No offset, monitoring only
    # ComfortOnly  – Comfort guard active, no price control

input_number:
  ###########################################################################
  ## COMFORT
  ###########################################################################
  svotc_comfort_temperature:
    name: "Comfort temperature (target)"
    min: 15
    max: 25
    step: 0.1
    mode: box
    unit_of_measurement: "°C"

  svotc_comfort_guard_activate_below_c:
    name: "Comfort guard activate (°C below target)"
    min: 0.2
    max: 3.0
    step: 0.1
    mode: box
    # Guard activates when indoor drops this far below target.
    # Default 0.8 °C.

  svotc_comfort_guard_deactivate_above_c:
    name: "Comfort guard release (°C below target)"
    min: 0.1
    max: 2.0
    step: 0.1
    mode: box
    # Guard releases when indoor rises to: target − this value.
    # Must be < activate threshold. Default 0.4 °C.

  svotc_comfort_boost_max_c:
    name: "Comfort boost max (°C)"
    min: 0
    max: 5
    step: 0.1
    mode: slider
    unit_of_measurement: "°C"
    icon: mdi:fire
    # Max negative offset applied during comfort guard (boost heating).
    # Also used as cheap-period pre-heat depth. Default 0.8 °C.
    # Ngenic-style: keep ≤ 1.0 to avoid over-heating.

  ###########################################################################
  ## PRICE / BRAKE
  ###########################################################################
  svotc_brake_hold_offset_c:
    name: "Brake hold offset (°C)"
    min: 0
    max: 10
    step: 0.5
    mode: box
    unit_of_measurement: "°C"
    # Positive offset applied during expensive periods ("fool" the heat pump
    # into thinking it is warmer outside → less heat output).
    # Ngenic reference: ≈ 4 °C typical.
    # FIX-19 (2.1.2): Hard max 10°C. Higher values risk disrupting defrost
    # logic and cause multi-hour drain times at max_delta=0.10. Default 4°C.

  svotc_price_floor_sek:
    name: "Minimum brake price (SEK/kWh)"
    min: 0
    max: 2.0
    step: 0.05
    initial: 0.10
    mode: slider
    unit_of_measurement: "SEK/kWh"
    icon: mdi:currency-eur
    # Brake requires price > P80 AND price > this floor.
    # Prevents braking on wind-power / negative-price days.
    # Set 0 to disable. Default 0.10 SEK/kWh.

  svotc_prebrake_lead_time_min:
    name: "Prebrake lead time (min)"
    min: 0
    max: 60
    step: 5
    mode: slider
    unit_of_measurement: "min"
    icon: mdi:timer-outline
    # How many minutes before a brake block SVOTC starts ramping up offset.
    # Auto-tune will adjust this via thermal_mass_factor. Default 25 min.

  svotc_bridge_hold_window_min:
    name: "Bridge-hold window (min)"
    min: 0
    max: 60
    step: 5
    mode: box
    unit_of_measurement: "min"
    # If next NEAR block starts within this window, do NOT ramp down between
    # peaks — avoids pointless oscillation.
    # FIX-20 (2.1.2): Max reduced 180 → 60 min. A large window bridges
    # separate price peaks into one continuous brake, holding a high offset
    # for hours. Recommended: 20 min (one 15-min gap + margin). Default 20.

  ###########################################################################
  ## DWELL  (flicker filter: raw → stable price state)
  ###########################################################################
  svotc_price_dwell_cheap_to_neutral_min:
    name: "Dwell cheap → neutral (min)"
    min: 0
    max: 120
    step: 1
    mode: box

  svotc_price_dwell_neutral_to_brake_min:
    name: "Dwell neutral → brake (min)"
    min: 0
    max: 120
    step: 1
    mode: box
    # Recommended ≥ 10 min for 15-min Nordpool data (absorbs single-block
    # flicker without triggering a full brake cycle).

  svotc_price_dwell_brake_to_neutral_min:
    name: "Dwell brake → neutral (min)"
    min: 0
    max: 120
    step: 1
    mode: box
    # Recommended ≥ 15 min for 15-min data (prevents yo-yo on alternating
    # blocks around P80).

  svotc_price_dwell_neutral_to_cheap_min:
    name: "Dwell neutral → cheap (min)"
    min: 0
    max: 120
    step: 1
    mode: box

  ###########################################################################
  ## BRAKE PHASE TIMING
  ###########################################################################
  svotc_brake_rampup_duration_min:
    name: "Brake ramp-up duration (min)"
    min: 1
    max: 14
    step: 1
    mode: box
    # Hard max 14 min so ramp-up completes within one 15-min price block.
    # Auto-tune sets this from thermal_mass_factor. Default 8 min.

  svotc_brake_hold_duration_min:
    name: "Brake hold minimum duration (min)"
    min: 1
    max: 60
    step: 1
    mode: box
    # Minimum time to stay in hold before ramp-down is allowed.

  svotc_brake_rampdown_duration_min:
    name: "Brake ramp-down duration (min)"
    min: 1
    max: 60
    step: 1
    mode: box

  ###########################################################################
  ## THERMAL
  ###########################################################################
  svotc_thermal_mass_factor:
    name: "Thermal mass factor"
    min: 0.5
    max: 1.5
    step: 0.05
    mode: slider
    # 0.5 = light/fast house  /  1.0 = normal  /  1.5 = heavy/slow house.
    # Scales ramp and dwell durations via auto-tune.
    # Learning adjusts this: more comfort violations → increase (house needs
    # longer ramps), zero violations → allow small decrease.

  ###########################################################################
  ## RATE LIMITING
  ###########################################################################
  svotc_max_delta_per_step_c:
    name: "Max delta per engine tick (°C)"
    min: 0.05
    max: 1.0
    step: 0.01
    mode: box
    # Maximum offset change per 30-second engine tick.
    # Auto-tune derives this from hold_offset and prebrake window.

  ###########################################################################
  ## SYSTEM STATE — read-only, managed by engine
  ###########################################################################
  svotc_requested_offset_c:
    name: "Requested offset (engine target)"
    min: -10
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "°C"

  svotc_applied_offset_c:
    name: "Applied offset (rate-limited)"
    min: -10
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "°C"

  ###########################################################################
  ## LEARNING STATE — managed by learning automation
  ###########################################################################
  svotc_comfort_violations_24h:
    name: "Comfort violations (24 h counter)"
    min: 0
    max: 200
    step: 1
    initial: 0
    mode: box

  svotc_zero_violation_days:
    name: "Consecutive zero-violation days"
    min: 0
    max: 365
    step: 1
    initial: 0
    mode: box
    # FIX-THERMAL-DRIFT (2.0.2): incremented each day with 0 violations,
    # reset on any non-zero violation day. Used by daily learning reset to
    # apply an extra thermal_mass decrease every N_RECOVERY (3) days, preventing
    # the factor from permanently ratcheting toward 1.5.

  svotc_learned_brake_efficiency:
    name: "Learned brake efficiency"
    min: 0.5
    max: 1.0
    step: 0.05
    initial: 1.0
    mode: box
    # Learning can only reduce this (1.0 = no reduction, 0.5 = max reduction).
    # Protects against learning inflating hold_offset beyond user's intent.
    # Hard max 1.0: learning never makes braking MORE aggressive than set.

  svotc_learning_cap_c:
    name: "Learning cap (°C)"
    min: 0
    max: 20
    step: 0.5
    initial: 10
    mode: box
    unit_of_measurement: "°C"
    # Only this portion of brake_hold_offset is affected by learned_brake_efficiency.
    # Anything above the cap remains "protected" and is not reduced by learning.

  ###########################################################################
  ## DEFROST PROTECTION — FIX-22
  ##   Caps the virtual outdoor temperature sent to the heat pump when outdoor
  ##   is cold. Prevents the heat pump from receiving a signal that would
  ##   interfere with its defrost logic.
  ##
  ##   Engine applies this AFTER learning:
  ##     if outdoor < svotc_defrost_virt_max_c:
  ##       hold_offset = min(hold_offset, svotc_defrost_virt_max_c - outdoor)
  ##   Effect: virtual_outdoor never exceeds svotc_defrost_virt_max_c.
  ##   Guard is inactive when outdoor >= svotc_defrost_virt_max_c (no risk).
  ##   Set to 20 to effectively disable. Default 8°C.
  ###########################################################################
  svotc_defrost_virt_max_c:
    name: "Defrost virtual outdoor cap (°C)"
    min: 0
    max: 20
    step: 0.5
    initial: 8
    mode: box
    unit_of_measurement: "°C"
    icon: mdi:snowflake-thermometer

  ###########################################################################
  ## P30/P80 CACHE — BUG-5 FIX
  ##   Stores last known good percentile values so the system survives the
  ##   midnight window where raw_today has < 12 data points.
  ##   Written by 40_notify.yaml (cache writer automation).
  ##   Read by 10_sensors.yaml P30/P80 sensors as fallback (< 4h old).
  ##   Invalidated automatically after 4 hours via svotc_percentile_cache_updated.
  ###########################################################################
  svotc_p30_cached:
    name: "P30 cached (last known good)"
    min: -2.0
    max: 20.0
    step: 0.001
    initial: 0
    mode: box
    unit_of_measurement: "SEK/kWh"
    icon: mdi:cash-minus

  svotc_p80_cached:
    name: "P80 cached (last known good)"
    min: -2.0
    max: 20.0
    step: 0.001
    initial: 0
    mode: box
    unit_of_measurement: "SEK/kWh"
    icon: mdi:cash-plus

###############################################################################
## CONFIGURATION — set once, rarely changed
###############################################################################
input_text:
  svotc_entity_indoor:
    name: "Indoor temperature entity ID"

  svotc_entity_outdoor:
    name: "Outdoor temperature entity ID"

  svotc_entity_price:
    name: "Nordpool price entity ID"

  svotc_notify_service:
    name: "Notify service (e.g. notify.mobile_app_phone)"

  svotc_version:
    name: "SVOTC Version"
    initial: "2.1.2"

  ###########################################################################
  ## INTERNAL STATE — read-only, managed by automations
  ###########################################################################
  svotc_last_price_state:
    name: "Stable price state"
    # Values: off | cheap | neutral | brake

  svotc_pending_price_state:
    name: "Pending price state (dwell buffer)"

  svotc_brake_phase:
    name: "Brake phase"
    # Values: idle | ramping_up | holding | ramping_down

  svotc_reason_code:
    name: "Engine reason code"

###############################################################################
## TIMESTAMPS — read-only, managed by automations
###############################################################################
input_datetime:
  svotc_pending_state_since:
    name: "Pending state since (dwell timer)"
    has_date: true
    has_time: true

  svotc_brake_phase_changed:
    name: "Brake phase last changed"
    has_date: true
    has_time: true

  svotc_engine_last_run:
    name: "Engine last run"
    has_date: true
    has_time: true

  # Timestamp of the last actual write to applied_offset (pump output).
  # Separate from engine_last_run which stamps every tick including skipped ones.
  # Used by selective-write logic to enforce heartbeat interval (5 min active,
  # 1 h idle) so the pump gets a confirmed value after HA restart even if
  # the offset has not changed.
  svotc_engine_last_write:
    name: "Engine last write to pump"
    has_date: true
    has_time: true

  svotc_freeze_since:
    name: "Price freeze since"
    has_date: true
    has_time: true

  # BUG-5 FIX: timestamp for P30/P80 cache — used to invalidate after 4 hours
  svotc_percentile_cache_updated:
    name: "Percentile cache last updated"
    has_date: true
    has_time: true

  # FIX-18 (2.0.2): cooldown timestamp for Auto PassThrough ↔ Smart switching.
  # Written by both auto-switch automations in 40_notify.yaml after each mode
  # change. Checked in trigger templates to enforce a 2-hour cooldown so the
  # system cannot oscillate Smart→PassThrough→Smart around the 14°C threshold.
  svotc_last_auto_mode_changed:
    name: "Last auto mode change (PassThrough ↔ Smart)"
    has_date: true
    has_time: true

###############################################################################
## FLAGS
###############################################################################
input_boolean:
  svotc_initialized:
    name: "SVOTC initialized"
    icon: mdi:check-decagram
    # Restore-safe by design: first install initializes because state != 'on'.
    # Reset to false manually to force re-initialization on next HA start.

  svotc_comfort_guard_enabled:
    name: "Comfort guard enabled"
    initial: true
    icon: mdi:shield-home

  svotc_learning_enabled:
    name: "Learning enabled"
    initial: true
    icon: mdi:brain
    # When OFF: efficiency fixed at 1.0, auto-tune does not write parameters.

  svotc_freeze_notified:
    name: "Price freeze notification sent"
    icon: mdi:bell-alert

  svotc_cheap_boost_enabled:
    name: "Cheap boost enabled"
    initial:
      true # FIX KRITISK-2: avkommenterad — entiteten
      # startade som 'unknown' vid HA-omstart när
      # initialized=on, vilket tyst inaktiverade
      # cheap boost tills state restore hann ifatt.
    icon: mdi:cash-plus

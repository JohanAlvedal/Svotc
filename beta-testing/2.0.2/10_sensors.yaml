###############################################################################
## SVOTC Core v1 - 10_sensors.yaml
## Readable template entities for source normalization, health, price state,
## and virtual outdoor temperature.
###############################################################################

template:
  - sensor:
      - name: SVOTC Indoor Temperature
        unique_id: svotc_indoor_temperature
        unit_of_measurement: "°C"
        state: >
          {% set e = states('input_text.svotc_source_indoor_temp') %}
          {% set v = states(e) if e not in ['unknown','unavailable','none','None',''] else 'unknown' %}
          {{ v | float(default=none) }}

      - name: SVOTC Outdoor Temperature
        unique_id: svotc_outdoor_temperature
        unit_of_measurement: "°C"
        state: >
          {% set e = states('input_text.svotc_source_outdoor_temp') %}
          {% set v = states(e) if e not in ['unknown','unavailable','none','None',''] else 'unknown' %}
          {{ v | float(default=none) }}

      - name: SVOTC Current Price
        unique_id: svotc_current_price
        unit_of_measurement: "SEK/kWh"
        state: >
          {% set e = states('input_text.svotc_source_price') %}
          {% set v = states(e) if e not in ['unknown','unavailable','none','None',''] else 'unknown' %}
          {{ v | float(default=none) }}

      - name: SVOTC Price P30 Today
        unique_id: svotc_price_p30_today
        unit_of_measurement: "SEK/kWh"
        state: >
          {% set p = state_attr(states('input_text.svotc_source_price'),'raw_today') %}
          {% if p is sequence and (p | count) >= 8 %}
            {% set vals = p | map(attribute='value') | map('float') | list | sort %}
            {% set i = (vals | count * 0.30) | int(0) %}
            {{ vals[i] }}
          {% else %}
            unknown
          {% endif %}

      - name: SVOTC Price P80 Today
        unique_id: svotc_price_p80_today
        unit_of_measurement: "SEK/kWh"
        state: >
          {% set p = state_attr(states('input_text.svotc_source_price'),'raw_today') %}
          {% if p is sequence and (p | count) >= 8 %}
            {% set vals = p | map(attribute='value') | map('float') | list | sort %}
            {% set i = (vals | count * 0.80) | int(0) %}
            {{ vals[i] }}
          {% else %}
            unknown
          {% endif %}

      - name: SVOTC Price State Raw Sensor
        unique_id: svotc_price_state_raw_sensor
        state: >
          {% set price = states('sensor.svotc_current_price') | float(default=none) %}
          {% set p30 = states('sensor.svotc_price_p30_today') | float(default=none) %}
          {% set p80 = states('sensor.svotc_price_p80_today') | float(default=none) %}
          {% set floor = states('input_number.svotc_price_floor_sek') | float(0.0) %}
          {% if price is none or p30 is none or p80 is none %}
            neutral
          {% elif price > p80 and price > floor %}
            brake
          {% elif price < p30 %}
            cheap
          {% else %}
            neutral
          {% endif %}

      - name: SVOTC Reason
        unique_id: svotc_reason
        state: "{{ states('input_text.svotc_reason_code') }}"

      - name: SVOTC Virtual Outdoor Temperature
        unique_id: svotc_virtual_outdoor_temperature
        unit_of_measurement: "°C"
        state: >
          {% set outdoor = states('sensor.svotc_outdoor_temperature') | float(default=none) %}
          {% set offset = states('input_number.svotc_applied_offset_c') | float(0) %}
          {% if outdoor is none %}
            unknown
          {% else %}
            {{ (outdoor + offset) | round(2) }}
          {% endif %}

  - binary_sensor:
      - name: SVOTC Inputs Healthy
        unique_id: svotc_inputs_healthy
        state: >
          {% set indoor_ok = states('sensor.svotc_indoor_temperature') not in ['unknown','unavailable','none'] %}
          {% set outdoor_ok = states('sensor.svotc_outdoor_temperature') not in ['unknown','unavailable','none'] %}
          {% set price_ok = states('sensor.svotc_current_price') not in ['unknown','unavailable','none'] %}
          {{ indoor_ok and outdoor_ok and price_ok }}

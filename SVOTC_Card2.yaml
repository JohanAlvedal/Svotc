title: SVOTC data
type: sections
max_columns: 4
badges:
  - type: entity
    entity: person.johan
    show_entity_picture: true
  - type: custom:mushroom-template-badge
    content: Laddbox
    icon: mdi:ev-plug-type2
    color: green
    tap_action:
      action: navigate
      navigation_path: /lovelace/laddbox
  - type: entity
    entity: sensor.elpris_spot_avgifter
    show_name: false
    show_state: true
    show_icon: true
    tap_action:
      action: navigate
      navigation_path: /dashboard-data/7
  - type: custom:mushroom-template-badge
    icon: mdi:mushroom
    color: red
    content: Jul
    tap_action:
      action: navigate
      navigation_path: /lovelace/jul
  - type: custom:mushroom-template-badge
    content: Tariff
    icon: mdi:power-plug
    color: blue
    tap_action:
      action: navigate
      navigation_path: /lovelace/9
  - type: custom:mushroom-template-badge
    content: System
    icon: mdi:server
    color: green
    tap_action:
      action: navigate
      navigation_path: /lovelace/system
sections:
  - type: grid
    cards:
      - type: entities
        title: SVOTC Källsensorer
        show_header_toggle: false
        entities:
          - entity: input_text.svotc_source_indoor_temp
            name: Inomhussensor
          - entity: input_text.svotc_source_outdoor_temp
            name: Utomhussensor
          - entity: input_text.svotc_source_price
            name: Prissensor
          - entity: input_text.svotc_source_notify
            name: Notiser
      - type: entities
        title: SVOTC Översikt
        show_header_toggle: false
        entities:
          - entity: input_select.svotc_mode
            name: Mode
          - entity: sensor.svotc_forward_price_state
            name: Forward state
            secondary_info: last-changed
          - entity: input_text.svotc_reason_code
            name: Reason
          - entity: sensor.svotc_current_price
            name: Current price
            secondary_info: last-changed
          - entity: input_number.svotc_requested_offset_c
            name: Requested offset
          - entity: input_number.svotc_applied_offset_c
            name: Applied offset
      - type: entities
        title: SVOTC Hälsa & temperatur
        show_header_toggle: false
        entities:
          - entity: binary_sensor.svotc_inputs_healthy
            name: Inputs healthy
          - entity: sensor.svotc_indoor_temperature
            name: Indoor temperature
          - entity: sensor.svotc_outdoor_temperature
            name: Outdoor temperature
          - entity: sensor.svotc_virtual_outdoor_temperature
            name: Virtual outdoor temperature
          - entity: sensor.svotc_price_p30_today
            name: P30
          - entity: sensor.svotc_price_p80_today
            name: P80
      - type: custom:mini-graph-card
        name: Pris vs P30 / P80 (12h)
        hours_to_show: 12
        points_per_hour: 4
        line_width: 3
        font_size: 75
        animate: true
        show:
          labels: false
          legend: true
          icon: false
        entities:
          - entity: sensor.elpris_spot_avgifter
            name: Elpris
            show_state: true
          - entity: sensor.svotc_price_p30_today
            name: P30
            show_state: true
          - entity: sensor.svotc_price_p80_today
            name: P80
            show_state: true
  - type: grid
    cards:
      - type: history-graph
        title: SVOTC Offset senaste 24h
        hours_to_show: 24
        refresh_interval: 30
        entities:
          - entity: input_number.svotc_requested_offset_c
            name: Requested
          - entity: input_number.svotc_applied_offset_c
            name: Applied
      - type: custom:auto-entities
        card:
          type: entities
          title: SVOTC Automatiseringar
          show_header_toggle: false
        filter:
          include:
            - entity_id: automation.svotc_*
              options:
                secondary_info: last-triggered
          exclude: []
        sort:
          method: name
      - type: history-graph
        title: SVOTC Temperatur senaste 24h
        hours_to_show: 24
        refresh_interval: 30
        entities:
          - entity: sensor.svotc_indoor_temperature
            name: Indoor
          - entity: sensor.svotc_outdoor_temperature
            name: Outdoor
          - entity: sensor.svotc_virtual_outdoor_temperature
            name: Virtual outdoor
      - type: entities
        title: Prisdiagnostik
        show_header_toggle: false
        entities:
          - entity: sensor.svotc_forward_price_state
            name: Forward state
          - entity: sensor.svotc_current_price
            name: Current price
          - entity: sensor.svotc_price_p30_today
            name: P30
          - entity: sensor.svotc_price_p80_today
            name: P80
          - entity: sensor.elpris_svotc
            name: SVOTC price
cards: []

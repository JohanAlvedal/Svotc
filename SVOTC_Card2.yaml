      - type: markdown
        content: >-
          # 🔧 SVOTC Basic (användarinställningar)


          Detta kort innehåller **det du som användare ska kunna ändra**. Varje
          rad nedan beskriver **vad entiteten gör** och **vad som händer om du
          ändrar den**.


          ---


          ## Komfortskydd (Comfort Guard)


          ### `input_boolean.svotc_comfort_guard_enabled` — Comfort Guard
          (på/av)

          **Gör:** Slår av/på komfortskyddet
          (`binary_sensor.svotc_comfort_guard_active`).  

          **Effekt vid ändring:**

          - **På**: om huset blir för kallt aktiveras guard och prisbroms
          blockeras; systemet kan i stället ge **negativ offset** (comfort
          boost).

          - **Av**: prisstyrningen får styra även om det blir kallt (risk:
          komfortfall).


          ### `input_number.svotc_comfort_temperature` — Måltemperatur (komfort)

          **Gör:** Målvärde som Comfort Guard jämför mot.  

          **Effekt vid ändring:** Högre mål → guard triggar tidigare (mer
          värme/komfort, mindre spar). Lägre mål → mer spar men risk kallare
          inne.


          ### `input_number.svotc_comfort_guard_activate_below_c` — Guard
          aktivera (°C under mål)

          **Gör:** Guard går in när `indoor < target - value`.  

          **Effekt vid ändring:** Större värde → guard går in senare (mer spar,
          större risk komfortfall). Mindre värde → guard går in tidigare (mer
          komfort).


          ### `input_number.svotc_comfort_guard_deactivate_above_c` — Guard
          släpp (°C under mål)

          **Gör:** Guard släpper när `indoor >= target - value` (hysteres).  

          **Effekt vid ändring:** Större värde → guard släpper senare (stabilt
          men kan “hänga kvar”). Mindre värde → släpper tidigare (risk för
          flimmer om innetemp pendlar).


          ---


          ## Pris / Broms (beteende)


          ### `input_number.svotc_brake_hold_offset_c` — Max broms (°C)

          **Gör:** Max positiv offset under dyrperioder (”mindre värme”).  

          **Effekt vid ändring:** Högre värde → mer spar men större risk
          komfortfall. Lägre värde → snällare broms.


          > Obs: Engine använder detta som bas och multiplicerar med
          `input_number.svotc_learned_brake_efficiency`.


          ### `input_number.svotc_prebrake_lead_time_min` — Prebrake lead time
          (min)

          **Gör:** Hur tidigt innan nästa dyra block systemet börjar “rampa upp”
          bromsen via `sensor.svotc_prebrake_strength`.  

          **Effekt vid ändring:** Högre → tidigare broms (bra vid trögt hus).
          Lägre → senare broms (risk att inte hinna bygga broms innan kort
          15-min-peak).


          ### `input_number.svotc_bridge_hold_window_min` — Bridge-hold fönster
          (min)

          **Gör:** Hindrar ramp-down mellan två nära toppar (via
          `sensor.svotc_minutes_to_next_near_brake_start`).  

          **Effekt vid ändring:** Högre → bromsen hålls kvar längre mellan
          toppar (stabilt, mer spar). Lägre → släpper snabbare (risk flimmer vid
          15-min).


          ⚠️ **Obs:** Denna entitet är med i din autotune-automation (kan
          skrivas över om autotune är aktiv).


          ---


          ## Husets tröghet och comfort boost


          ### `input_number.svotc_thermal_mass_factor` — Husets tröghet (thermal
          mass)

          **Gör:** Skalar prebrake-fönster (via
          `sensor.svotc_prebrake_window_min`) och används av autotune för
          ramp/dwell/bridge.  

          **Effekt vid ändring:** Högre → systemet antar trögare hus (startar
          tidigare/ger längre tider). Lägre → snabbare hus (kortare tider).


          ### `input_number.svotc_comfort_boost_max_c` — Comfort boost max (°C)

          **Gör:** Max negativ offset när Comfort Guard är aktiv (”mer
          värme”).  

          **Effekt vid ändring:** Högre → starkare komfortskydd (snabbare
          återhämtning men mindre spar). Lägre → svagare skydd (risk att guard
          inte orkar).


          ### `input_number.svotc_price_floor_sek` — Prisgolv för broms
          (SEK/kWh)

          **Gör:** Broms aktiveras bara om `pris > P80` **och** `pris >
          price_floor`.  

          **Effekt vid ändring:** Högre golv → bromsar bara vid riktigt dyra
          priser (mindre broms). Lägre golv/0 → broms kan trigga även när P80 är
          låg (mer aggressivt vid “platta” dygn).


          ---

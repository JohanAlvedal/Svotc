title: SVOTC Main
icon: ""
cards: []
type: sections
sections:
  - type: grid
    cards:
      - type: entities
        title: 🎛️ SVOTC Kontroller
        state_color: true
        show_header_toggle: false
        entities:
          - entity: input_select.svotc_mode
            name: Driftsläge
            icon: mdi:toggle-switch
          - type: section
            label: Komfortinställningar
          - entity: input_number.svotc_comfort_temperature
            name: Måltemperatur
            icon: mdi:target
          - entity: input_number.svotc_comfort_guard_activate_below_c
            name: Aktivera komfortskydd (under mål)
            icon: mdi:shield-alert
          - entity: input_number.svotc_comfort_guard_release_below_c
            name: Släpp komfortskydd (nära mål)
            icon: mdi:shield-check
          - entity: input_number.svotc_comfort_boost_max_c
            name: Komfortboost max
            icon: mdi:fire
          - entity: input_boolean.svotc_comfort_guard_latch
            name: Komfortskydd aktivt
            icon: mdi:shield-home
          - type: section
            label: Övertemperatur
          - entity: input_number.svotc_overtemp_brake_activate_above_c
            name: Aktivera överbroms (över mål)
            icon: mdi:thermometer-high
          - entity: input_number.svotc_overtemp_brake_release_above_c
            name: Släpp överbroms
            icon: mdi:thermometer-chevron-down
          - entity: input_boolean.svotc_overtemp_latch
            name: Övertemperatur aktiv
            icon: mdi:radiator-disabled
          - type: section
            label: Prisoptimering
          - entity: input_boolean.svotc_cheap_boost_enabled
            name: Billigpris-boost aktiverad
            icon: mdi:piggy-bank
          - entity: input_number.svotc_cheap_boost_offset_c
            name: Billigpris-boost offset
            icon: mdi:thermometer-chevron-down
          - entity: input_number.svotc_brake_hold_offset_c
            name: Max bromsoffset
            icon: mdi:thermometer-plus
          - entity: input_number.svotc_price_floor_sek
            name: Minsta bromspris
            icon: mdi:cash
          - type: section
            label: Systemhälsa
          - entity: binary_sensor.svotc_inputs_healthy
            name: Indata OK
            icon: mdi:check-decagram
          - type: section
            label: Offset
          - entity: input_number.svotc_requested_offset_c
            name: Begärd offset
            icon: mdi:thermometer-chevron-up
          - entity: input_number.svotc_applied_offset_c
            name: Tillämpad offset
            icon: mdi:thermometer-lines
          - entity: input_number.svotc_max_delta_per_step_c
            name: Max ändring per steg
            icon: mdi:chart-timeline-variant
      - type: custom:mini-graph-card
        name: 📈 Offset-utveckling (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 3
        font_size: 75
        animate: true
        show:
          labels: false
          legend: true
          icon: false
        entities:
          - entity: input_number.svotc_requested_offset_c
            name: Begärd offset
            show_state: true
          - entity: input_number.svotc_applied_offset_c
            name: Tillämpad offset
            show_state: true
      - type: custom:mini-graph-card
        name: 🌡️ Temperaturöversikt (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        font_size: 75
        animate: true
        show:
          labels: true
          legend: true
          icon: false
        entities:
          - entity: sensor.svotc_outdoor_temperature
            name: Utomhus (verklig)
            color: "#3498db"
            show_state: true
          - entity: sensor.svotc_virtual_outdoor_temperature
            name: Virtuell ute (→VP)
            color: "#9b59b6"
            show_state: true
    columns: 1
    square: false
  - type: grid
    cards:
      - type: markdown
        title: SVOTC – MAIN
        content: >-
          {# =========================
             SVOTC 3.0.0 / Core v1
             Safe values - current file set
             ========================= #}

          {# Grundstatus #}

          {% set mode = states('input_select.svotc_mode') %}

          {% set reason = states('input_text.svotc_reason_code') | trim %}

          {% set version =
          state_attr('sensor.svotc_virtual_outdoor_temperature', 'version') %}

          {% set inputs_ok = is_state('binary_sensor.svotc_inputs_healthy',
          'on') %}


          {# Temperatur / offset #}

          {% set req = states('input_number.svotc_requested_offset_c') |
          float(0) %}

          {% set app = states('input_number.svotc_applied_offset_c') | float(0)
          %}

          {% set delta = req - app %}


          {% set indoor_s = states('sensor.svotc_indoor_temperature') %}

          {% set outdoor_s = states('sensor.svotc_outdoor_temperature') %}

          {% set target_s = states('input_number.svotc_comfort_temperature') %}


          {% set indoor = indoor_s | float(0) %}

          {% set target = target_s | float(21) %}


          {# Pris #}

          {% set price_s = states('sensor.svotc_current_price') %}

          {% set price = price_s | float(0) %}

          {% set price_ok = price_s not in
          ['unknown','unavailable','none','None',''] %}

          {% set forward = states('sensor.svotc_forward_price_state') %}


          {# Guard / latches #}

          {% set comfort_latch =
          is_state('input_boolean.svotc_comfort_guard_latch', 'on') %}

          {% set overtemp_latch = is_state('input_boolean.svotc_overtemp_latch',
          'on') %}


          {% set comfort_on_delta =
          states('input_number.svotc_comfort_guard_activate_below_c') |
          float(0.8) %}

          {% set comfort_off_delta =
          states('input_number.svotc_comfort_guard_release_below_c') |
          float(0.4) %}

          {% set over_on_delta =
          states('input_number.svotc_overtemp_brake_activate_above_c') |
          float(0.8) %}

          {% set over_off_delta =
          states('input_number.svotc_overtemp_brake_release_above_c') |
          float(0.4) %}


          {% set comfort_on_at = (target - comfort_on_delta) | round(2) %}

          {% set comfort_off_at = (target - comfort_off_delta) | round(2) %}

          {% set over_on_at = (target + over_on_delta) | round(2) %}

          {% set over_off_at = (target + over_off_delta) | round(2) %}


          {% set virt = states('sensor.svotc_virtual_outdoor_temperature') %}


          #### 📊 Statusöversikt


          **Driftsläge:** `{{ mode }}`  

          **Strategi:** `{{ reason }}`  

          **Systemhälsa:** {% if inputs_ok %}✅ OK{% else %}⚠️ PROBLEM{% endif
          %}  

          **Prisdata:** {% if price_ok %}✅ OK{% else %}⚠️ SAKNAS{% endif %}


          ---


          #### 🧠 Sammanfattning (varför?)


          **Reason:** `{{ reason }}`


          {% if reason == 'PRICE_BRAKE' %}

          💡 Bromsar värme eftersom prisläget är dyrt nu  

          - Pris: {% if price_ok %}{{ price }}{% else %}—{% endif %}

          - Forward state: `{{ forward }}`

          - Begärd offset: {{ req | round(2) }}°C

          - Tillämpad offset: {{ app | round(2) }}°C


          {% elif reason == 'PRICE_PREBRAKE' %}

          🟠 Förbromsar inför kommande dyrperiod  

          - Pris nu: {% if price_ok %}{{ price }}{% else %}—{% endif %}

          - Forward state: `{{ forward }}`

          - Begärd offset: {{ req | round(2) }}°C

          - Tillämpad offset: {{ app | round(2) }}°C


          {% elif reason == 'PRICE_HOLD' %}

          🟡 Håller kvar broms genom kort mellanlucka  

          - Pris nu: {% if price_ok %}{{ price }}{% else %}—{% endif %}

          - Forward state: `{{ forward }}`

          - Begärd offset: {{ req | round(2) }}°C

          - Tillämpad offset: {{ app | round(2) }}°C


          {% elif reason == 'PRICE_CHEAP' %}

          🟢 Billig el — systemet förvärmer  

          - Pris: {% if price_ok %}{{ price }}{% else %}—{% endif %}

          - Forward state: `{{ forward }}`

          - Begärd offset: {{ req | round(2) }}°C

          - Tillämpad offset: {{ app | round(2) }}°C


          {% elif reason == 'COMFORT_GUARD' %}

          🛡️ Komfort prioriteras — inne är för kallt  

          - Inne: {{ indoor | round(2) }}°C

          - Aktiverar under: {{ comfort_on_at }}°C

          - Offset: {{ app | round(2) }}°C


          {% elif reason == 'OVERTEMP_BRAKE' %}

          🔥 Bromsar extra eftersom inne är för varmt  

          - Inne: {{ indoor | round(2) }}°C

          - Aktiverar över: {{ over_on_at }}°C

          - Offset: {{ app | round(2) }}°C


          {% elif reason == 'NEUTRAL' %}

          ✅ Normal drift — ingen justering


          {% elif reason == 'OFF' %}

          ⚫ Systemet är avstängt


          {% elif reason == 'PASS_THROUGH' %}

          📊 PassThrough — ingen styrning


          {% elif reason == 'FAIL_SAFE' %}

          ⚠️ Fail-safe — indatasystemet är inte friskt, offset går mot 0


          {% else %}

          ❓ Okänd strategi: {{ reason }}

          {% endif %}


          ---


          #### 🌡️ Temperaturer


          | Sensor | Värde | Status |

          |--------|-------|--------|

          | 🏠 Inne | **{{ indoor_s }}°C** | Mål: {{ target_s }}°C |

          | 🌡️ Ute (verklig) | **{{ outdoor_s }}°C** | {% if outdoor_s not in
          ['unknown','unavailable','none','None',''] %}OK{% else %}⚠️ Saknas{%
          endif %} |

          | 🎯 Virtuell (→VP) | **{{ virt }}°C** | Offset: {{
          states('input_number.svotc_applied_offset_c') }}°C |


          **Offsetstatus:**  

          Begärd: **{{ req | round(2) }}°C**  

          Tillämpad: **{{ app | round(2) }}°C**{% if delta | abs > 0.05 %} →
          Rampar: {{ delta | round(2) }}°C{% endif %}


          ---


          #### 💰 Prisstyrning


          **Aktuellt pris:** {% if price_ok %}{{ price_s }} SEK/kWh{% else %}—{%
          endif %}


          **Forward price state:**  

          {% if forward == 'cheap' %}🟢 Billig

          {% elif forward == 'prebrake' %}🟠 Förbroms

          {% elif forward == 'hold' %}🟡 Hold

          {% elif forward == 'brake' %}🔴 Dyr

          {% elif forward == 'neutral' %}⚪ Neutral

          {% else %}❓ {{ forward }}

          {% endif %}


          **Billigpris-boost:** {% if
          is_state('input_boolean.svotc_cheap_boost_enabled','on') %}✅ På{% else
          %}⚪ Av{% endif %}  

          **Billigpris-offset:** {{
          states('input_number.svotc_cheap_boost_offset_c') }}°C  

          **Max bromsoffset:** {{
          states('input_number.svotc_brake_hold_offset_c') }}°C  

          **Prisgolv:** {{ states('input_number.svotc_price_floor_sek') }}
          SEK/kWh


          ---


          #### 🛡️ Komfortskydd


          **Status:** {% if comfort_latch %}🟢 AKTIV{% else %}⚪ Standby{% endif
          %}


          **Mål:** **{{ target | round(2) }}°C**  

          **Inne:** **{{ indoor | round(2) }}°C**


          ❄️ **Aktiverar** om inne ≤ **{{ comfort_on_at }}°C**  

          🔥 **Släpper** om inne ≥ **{{ comfort_off_at }}°C**


          {% if comfort_latch %}
            {% set left = (comfort_off_at - indoor) | round(2) %}
            {% if left > 0 %}
          ➡️ Kvar tills guard släpper: **{{ left }}°C**
            {% else %}
          ➡️ Över släppgränsen med **{{ (-left) | round(2) }}°C**
            {% endif %}
          {% else %}
            {% set left = (indoor - comfort_on_at) | round(2) %}
            {% if left > 0 %}
          ➡️ Kvar tills guard aktiverar: **{{ left }}°C**
            {% else %}
          ➡️ Under aktiveringsgränsen med **{{ (-left) | round(2) }}°C**
            {% endif %}
          {% endif %}


          ---


          #### 🔥 Övertemperaturbroms


          **Status:** {% if overtemp_latch %}🟠 AKTIV{% else %}⚪ Standby{% endif
          %}


          🌡️ **Aktiverar** om inne ≥ **{{ over_on_at }}°C**  

          🧊 **Släpper** om inne ≤ **{{ over_off_at }}°C**


          {% if overtemp_latch %}
            {% set left = (indoor - over_off_at) | round(2) %}
            {% if left > 0 %}
          ➡️ Kvar tills överbroms släpper: **{{ left }}°C**
            {% else %}
          ➡️ Under släppgränsen med **{{ (-left) | round(2) }}°C**
            {% endif %}
          {% else %}
            {% set left = (over_on_at - indoor) | round(2) %}
            {% if left > 0 %}
          ➡️ Kvar tills överbroms aktiverar: **{{ left }}°C**
            {% else %}
          ➡️ Över aktiveringsgränsen med **{{ (-left) | round(2) }}°C**
            {% endif %}
          {% endif %}


          ---


          #### 🧩 Motorstatus


          **Requested offset:** `{{
          states('input_number.svotc_requested_offset_c') }}`  

          **Applied offset:** `{{ states('input_number.svotc_applied_offset_c')
          }}`  

          **Reason:** `{{ states('input_text.svotc_reason_code') }}`  

          **Forward price state:** `{{
          states('sensor.svotc_forward_price_state') }}`


          ---


          *Uppdaterad: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}*  

          *Version: {{ version }}*

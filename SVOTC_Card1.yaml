title: SVOTC Main
icon: ""
cards: []
type: sections
sections:
  - type: grid
    cards:
      - type: entities
        title: 🎛️ SVOTC Kontroller
        state_color: true
        show_header_toggle: false
        entities:
          - entity: input_select.svotc_mode
            name: Driftsläge
            icon: mdi:toggle-switch
          - type: section
            label: Komfortinställningar
          - entity: input_number.svotc_comfort_temperature
            name: Måltemperatur
            icon: mdi:target
          - entity: input_number.svotc_comfort_guard_activate_below_c
            name: Aktivera komfortskydd (under mål)
            icon: mdi:shield-alert
          - entity: input_number.svotc_comfort_guard_deactivate_above_c
            name: Avaktivera komfortskydd (nära mål)
            icon: mdi:shield-check
          - entity: input_boolean.svotc_comfort_guard_enabled
            name: Komfortskydd aktiverat
            icon: mdi:shield-home
          - entity: automation.svotc_auto_tune_normal_house_defaults
            secondary_info: last-triggered
          - type: section
            label: Prisoptimering
          - entity: input_number.svotc_prebrake_lead_time_min
            name: Förbromsning – starta före (min)
            icon: mdi:timer-sand
          - entity: input_number.svotc_comfort_boost_max_c
            name: Komfortboost – max (°C)
            icon: mdi:fire
          - entity: input_number.svotc_brake_hold_offset_c
            name: Max bromsoffset (°C)
            icon: mdi:thermometer-minus
          - type: section
            label: Systemhälsa
          - entity: binary_sensor.svotc_inputs_healthy
            name: Temperatursensorer OK
            icon: mdi:thermometer-check
          - entity: binary_sensor.svotc_price_available
            name: Prisdata tillgänglig
            icon: mdi:cash-check
          - entity: binary_sensor.svotc_comfort_guard_active
            name: Komfortskydd aktivt
            icon: mdi:shield-alert-outline
          - type: section
            label: Timing
          - entity: sensor.svotc_minutes_to_next_brake_start
            name: Minuter till nästa dyr period
            icon: mdi:timer-outline
          - entity: sensor.svotc_prebrake_window_min
            name: Förbromsfönster (min)
            icon: mdi:window-open
          - entity: input_boolean.svotc_initialized
            secondary_info: last-changed
          - entity: automation.svotc_startup_initialization
            secondary_info: last-triggered
          - entity: input_text.svotc_reason_code
      - type: custom:mini-graph-card
        name: 📈 Offset-utveckling (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 3
        font_size: 75
        animate: true
        show:
          labels: false
          legend: true
          icon: false
        entities:
          - entity: input_number.svotc_requested_offset_c
            name: Begärd offset
            show_state: true
          - entity: input_number.svotc_applied_offset_c
            name: Tillämpad offset
            show_state: true
      - type: custom:mini-graph-card
        name: 🌡️ Temperaturöversikt (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        font_size: 75
        animate: true
        show:
          labels: true
          legend: true
          icon: false
        entities:
          - entity: sensor.svotc_src_outdoor
            name: Utomhus (verklig)
            color: "#3498db"
            show_state: true
          - entity: sensor.svotc_virtual_outdoor_temperature
            name: Virtuell ute (→VP)
            color: "#9b59b6"
            show_state: true
    column_span: 1
  - type: grid
    cards:
      - type: markdown
        title: SVOTC – MAIN
        content: >
          {# =========================
             Förberedelser / safe values
             ========================= #}

          {# Grundstatus #}

          {% set mode = states('input_select.svotc_mode') %}

          {# FIX: trim så " NEUTRAL " matchar 'NEUTRAL' i dina elif #} {% set
          reason = states('input_text.svotc_reason_code') | trim %}

          {% set inputs_ok = is_state('binary_sensor.svotc_inputs_healthy',
          'on') %}

          {% set price_ok = is_state('binary_sensor.svotc_price_available',
          'on') %}


          {# Temperatur/offset #}

          {% set req = states('input_number.svotc_requested_offset_c') |
          float(0) %}

          {% set app = states('input_number.svotc_applied_offset_c') | float(0)
          %}

          {% set delta = req - app %}


          {# Pris #}

          {% set p_s = states('sensor.svotc_current_price') %}

          {% set p80_s = states('sensor.svotc_p80') %}

          {% set p = p_s | float(0) %}

          {% set p80 = p80_s | float(0) %}

          {% set p_ok_val = p_s not in ['unknown','unavailable','none',''] %}

          {% set p80_ok_val = p80_s not in ['unknown','unavailable','none','']
          %}


          {# Prebrake #}

          {% set ttn = states('sensor.svotc_minutes_to_next_brake_start') |
          float(999) %}

          {% set win = states('sensor.svotc_prebrake_window_min') | float(0) %}

          {% set pre = states('sensor.svotc_prebrake_strength') | float(0) %}

          {% set starts_in = (ttn - win) if (ttn < 900 and win > 0) else none %}


          {# Komfortskydd #}

          {% set guard_on =
          is_state('binary_sensor.svotc_comfort_guard_active','on') %}

          {% set guard_enabled =
          is_state('input_boolean.svotc_comfort_guard_enabled','on') %}

          {% set target = states('sensor.svotc_dynamic_target_temperature') |
          float(0) %}

          {% set indoor = states('sensor.svotc_src_indoor') | float(0) %}

          {% set act =
          states('input_number.svotc_comfort_guard_activate_below_c') | float(0)
          %}

          {% set deact =
          states('input_number.svotc_comfort_guard_deactivate_above_c') |
          float(0) %}

          {% set ignite_at = (target - act) | round(2) %}

          {% set release_at = (target - deact) | round(2) %}


          {# Bromsfas #}

          {% set phase = states('input_text.svotc_brake_phase') %}

          {% set phase_ts =
          as_timestamp(states('input_datetime.svotc_brake_phase_changed'),
          default=none) %}

          {% set phase_age = ((as_timestamp(now()) - phase_ts) / 60) if phase_ts
          is number else none %}

          {% set rampup = states('input_number.svotc_brake_rampup_duration_min')
          | float(0) %}

          {% set hold = states('input_number.svotc_brake_hold_duration_min') |
          float(0) %}

          {% set rampdown =
          states('input_number.svotc_brake_rampdown_duration_min') | float(0) %}


          {# Prisstatus #}

          {% set price_state = states('input_text.svotc_last_price_state') %}

          {% set raw = states('sensor.svotc_raw_price_state') %}


          {# Tid till nästa dyrperiod som klockslag #}

          {% set mins = ttn %}

          {% set now_ts = as_timestamp(now()) %}

          {% set next_ts = (now_ts + (mins * 60)) if (mins is number and mins <
          900 and mins > 0) else none %}

          {% set next_hhmm = (next_ts | timestamp_custom('%H:%M', true)) if
          next_ts is not none else '—' %}



          #### 📊 Statusöversikt


          **Driftsläge:** `{{ mode }}`  

          **Strategi:** `{{ reason }}`  

          **Systemhälsa:** {% if inputs_ok %}✅ OK{% else %}⚠️ PROBLEM{% endif
          %}  

          **Prisdata:** {% if price_ok %}✅ OK{% else %}⚠️ SAKNAS{% endif %}


          ---

          #### 🧠 Sammanfattning (varför?)


          **Reason:** `{{ reason }}`


          {% if reason == 'PRICE_BRAKE' %}

          💡 Bromsar värme (dyr el / prebrake)  

          - Pris: {% if p_ok_val %}{{ p }}{% else %}—{% endif %} (P80: {% if
          p80_ok_val %}{{ p80 }}{% else %}—{% endif %})

          - Prebrake: {{ (pre * 100) | round(0) }}%

          - Fas: {{ phase }}

          - Offset: {{ app | round(2) }}°C


          {% elif reason == 'PRICE_PREBRAKE' %}

          🟡 Förbromsar (prebrake aktiv)

          - Pris: {% if p_ok_val %}{{ p }}{% else %}—{% endif %} (P80: {% if
          p80_ok_val %}{{ p80 }}{% else %}—{% endif %})

          - Prebrake: {{ (pre * 100) | round(0) }}%

          - Nästa dyrperiod: {% if ttn < 900 %}{{ next_hhmm }} (om {{ ttn |
          round(0) }} min){% else %}—{% endif %}

          - Fas: {{ phase }}

          - Offset: {{ app | round(2) }}°C


          {% elif reason == 'COMFORT_GUARD' %}

          🛡️ Skyddar komfort (inne för låg)  

          - Inne: {{ indoor | round(2) }}°C (aktiverar vid {{ ignite_at }}°C)

          - Offset: {{ app | round(2) }}°C


          {% elif reason == 'MCP_BLOCKS_BRAKE' %}

          🛡️ Komfort prioriteras (broms blockeras)  

          - Dyr el + låg inne → comfort guard vinner


          {% elif reason == 'NEUTRAL' %}

          ✅ Normal drift (ingen justering)


          {% elif reason == 'OFF' %}

          ⚫ Systemet är avstängt


          {% elif reason == 'PASS_THROUGH' %}

          📊 Övervakningsläge (ingen styrning)


          {% elif reason == 'COMFORT_ONLY' %}

          🛡️ Endast komfort (ingen prisstyrning)


          {% elif reason == 'MISSING_INPUTS_FREEZE' %}

          ⚠️ Sensorer saknas (offset fryst)


          {% elif reason == 'PRICE_DATA_WARMUP_FREEZE' %}

          ⏳ Prisdata ej redo


          {% else %}

          ❓ Okänd strategi: {{ reason }}

          {% endif %}


          ---

          #### 🌡️ Temperaturer

          | Sensor | Värde | Status |

          |--------|-------|--------|

          | 🏠 Inne | **{{ states('sensor.svotc_src_indoor') }}°C** | Mål: {{
          states('sensor.svotc_dynamic_target_temperature') }}°C |

          | 🌡️ Ute (verklig) | **{{ states('sensor.svotc_src_outdoor') }}°C** |
          OK |

          | 🎯 Virtuell (→VP) | **{{
          states('sensor.svotc_virtual_outdoor_temperature') }}°C** | Offset: {{
          states('input_number.svotc_applied_offset_c') }}°C |
          **Offsetstatus:**  


          Begärd: **{{ req | round(2) }}°C**

          Tillämpad: **{{ app | round(2) }}°C**{% if delta | abs > 0.05 %}  →
          Rampar: {{ delta | round(2) }}°C{% endif %}


          ---

          #### 💰 Prisstyrning

          **Aktuellt pris:** {{ states('sensor.svotc_src_current_price') }}
          SEK/kWh  

          **Referensvärden:** P30 {{ states('sensor.svotc_p30') }} | P80 {{
          states('sensor.svotc_p80') }}


          **Prisstatus:** {% if price_state == 'cheap' %}🟢 Billig{% elif
          price_state == 'brake' %}🔴 Dyr{% elif price_state == 'off' %}⚫ Av{%
          else %}🟡 Neutral{% endif %}  

          (stabil: `{{ price_state }}` | rå: `{{ raw }}`)


          **Prebrake:**  

          {% if win <= 0 %}

          - ⚪ Inaktiv

          {% elif ttn == 0 %}

          - 🔴 I dyrperiod nu

          {% elif pre > 0 %}

          - 🟡 Aktiv: {{ (pre * 100) | round(0) }}% • Dyrperiod **{{ next_hhmm
          }}** (om {{ ttn | round(0) }} min)

          {% elif starts_in is not none and starts_in > 0 %}

          {% set wait_ts = now_ts + (starts_in * 60) %}

          - 🟢 Väntar: startar **{{ wait_ts | timestamp_custom('%H:%M', true)
          }}** (om {{ starts_in | round(0) }} min) • Fönster {{ win }} min

          {% else %}
           ⏱️ Nästa dyrperiod: {% if ttn < 900 %}**{{ next_hhmm }}** (om {{ ttn | round(0) }} min){% else %}**ingen i sikte**{% endif %}
          {% endif %}

          ---

          #### 🛡️ Komfortskydd

          {% set guard_on =
          is_state('binary_sensor.svotc_comfort_guard_active','on') %}

          {% set enabled =
          is_state('input_boolean.svotc_comfort_guard_enabled','on') %}

          {% set target = states('sensor.svotc_dynamic_target_temperature') |
          float(0) %}

          {% set indoor = states('sensor.svotc_src_indoor') | float(0) %}

          {% set act =
          states('input_number.svotc_comfort_guard_activate_below_c') | float(0)
          %}

          {% set deact =
          states('input_number.svotc_comfort_guard_deactivate_above_c') |
          float(0) %}


          {% set ignite_at  = (target - act) | round(2) %}

          {% set release_at = (target - deact) | round(2) %}


          **Status:** {% if not enabled %}🔴 AVSTÄNGD{% elif guard_on %}🟢
          AKTIV{% else %}⚪ Standby{% endif %}


          {% if enabled %}

          **Mål:** **{{ target | round(2) }}°C** • **Inne:** **{{ indoor |
          round(2) }}°C**


          ❄️ **Aktivt** om inne < **{{ ignite_at }}°C**  *(mål − {{ act }}°C)*

          🔥 **Släpper** om inne ≥ **{{ release_at }}°C** *(mål − {{ deact
          }}°C)*


          {% if guard_on %}
            {% set left = (release_at - indoor) | round(2) %}
            {% if left > 0 %}
          ➡️ Kvar tills den aktiveras: **{{ left }}°C**
            {% else %}
          ➡️ Över släckgränsen med **{{ (-left) | round(2) }}°C** (bör släcka
          när uppdatering/automation slår igenom)
            {% endif %}
          {% else %}
            {% set left = (indoor - ignite_at) | round(2) %}
            {% if left > 0 %}
          ➡️ Kvar tills den aktiveras: **{{ left }}°C**
            {% else %}
          ➡️ Under gränsen med **{{ (-left) | round(2) }}°C** (bör avvaktiveras
          när uppdatering/automation slår igenom)
            {% endif %}
          {% endif %}

          {% endif %}


          ---


          **Aktuell fas:** 

          {% if phase == 'idle' %}⚪ Vilar

          {% elif phase == 'ramping_up' %}🟡 Rampar upp{% if phase_age is not
          none %} ({{ phase_age | round(1) }}/{{ rampup }} min){% endif %}

          {% elif phase == 'holding' %}🔴 Håller{% if phase_age is not none %}
          ({{ phase_age | round(1) }}/{{ hold }} min){% endif %}

          {% elif phase == 'ramping_down' %}🟢 Rampar ner{% if phase_age is not
          none %} ({{ phase_age | round(1) }}/{{ rampdown }} min){% endif %}

          {% else %}❓ {{ phase }}

          {% endif %}


          ---

          **Version:** `{{ states('input_text.svotc_version') }}`

          *Uppdaterad: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}*
badges:
  - type: entity
    entity: person.johan
    show_entity_picture: true
  - type: custom:mushroom-template-badge
    content: Laddbox
    icon: mdi:ev-plug-type2
    color: green
    tap_action:
      action: navigate
      navigation_path: /lovelace/laddbox
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    tap_action:
      action: navigate
      navigation_path: /dashboard-data/7
    entity: sensor.elpris_spot_avgifter
  - type: custom:mushroom-template-badge
    icon: mdi:mushroom
    color: red
    content: Jul
    tap_action:
      action: navigate
      navigation_path: /lovelace/jul
  - type: custom:mushroom-template-badge
    content: Tariff
    icon: mdi:power-plug
    color: blue
    tap_action:
      action: navigate
      navigation_path: /lovelace/9
  - type: custom:mushroom-template-badge
    content: System
    icon: mdi:server
    color: green
    tap_action:
      action: navigate
      navigation_path: /lovelace/system
max_columns: 4

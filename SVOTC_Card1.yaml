title: SVOTC Main
icon: ""
cards: []
type: sections
sections:
  - type: grid
    cards:
      - type: entities
        title: 🎛️ SVOTC Controls
        state_color: true
        show_header_toggle: false
        entities:
          - entity: input_select.svotc_mode
            name: Operating Mode
            icon: mdi:toggle-switch
          - type: section
            label: Comfort Settings
          - entity: sensor.svotc_forward_price_state
            name: Price State
          - entity: input_number.svotc_comfort_temperature
            name: Target Temperature
            icon: mdi:target
          - entity: input_number.svotc_comfort_guard_activate_below_c
            name: Activate Comfort Guard (below target)
            icon: mdi:shield-alert
          - entity: input_number.svotc_comfort_guard_release_below_c
            name: Release Comfort Guard (near target)
            icon: mdi:shield-check
          - entity: input_number.svotc_comfort_boost_max_c
            name: Comfort Boost Max
            icon: mdi:fire
          - entity: input_boolean.svotc_comfort_guard_latch
            name: Comfort Guard Active
            icon: mdi:shield-home
          - type: section
            label: Over Temperature
          - entity: input_number.svotc_overtemp_brake_activate_above_c
            name: Activate Over-Brake (above target)
            icon: mdi:thermometer-high
          - entity: input_number.svotc_overtemp_brake_release_above_c
            name: Release Over-Brake
            icon: mdi:thermometer-chevron-down
          - entity: input_boolean.svotc_overtemp_latch
            name: Over Temperature Active
            icon: mdi:radiator-disabled
          - type: section
            label: Price Optimization
          - entity: input_boolean.svotc_cheap_boost_enabled
            name: Cheap Price Boost Enabled
            icon: mdi:piggy-bank
          - entity: input_number.svotc_cheap_boost_offset_c
            name: Cheap Price Boost Offset
            icon: mdi:thermometer-chevron-down
          - entity: input_number.svotc_brake_hold_offset_c
            name: Max Brake Offset
            icon: mdi:thermometer-plus
          - entity: input_number.svotc_price_floor_sek
            name: Minimum Brake Price
            icon: mdi:cash
          - type: section
            label: System Health
          - entity: binary_sensor.svotc_inputs_healthy
            name: Inputs OK
            icon: mdi:check-decagram
          - type: section
            label: Offset
          - entity: input_number.svotc_requested_offset_c
            icon: mdi:thermometer-chevron-up
          - entity: input_number.svotc_applied_offset_c
            icon: mdi:thermometer-lines
            name: Applied Offset
          - entity: input_number.svotc_max_delta_per_step_c
            icon: mdi:chart-timeline-variant
      - type: custom:mini-graph-card
        name: 📈 Offset-utveckling (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 3
        font_size: 75
        animate: true
        show:
          labels: false
          legend: true
          icon: false
        entities:
          - entity: input_number.svotc_requested_offset_c
            name: Begärd offset
            show_state: true
          - entity: input_number.svotc_applied_offset_c
            name: Tillämpad offset
            show_state: true
      - type: custom:mini-graph-card
        name: Pris vs P30 / P80 (12h)
        hours_to_show: 12
        points_per_hour: 4
        line_width: 3
        font_size: 75
        animate: true
        show:
          labels: false
          legend: true
          icon: false
        entities:
          - entity: sensor.elpris_spot_avgifter
            name: Elpris
            show_state: true
          - entity: sensor.svotc_price_p30_today
            name: P30
            show_state: true
          - entity: sensor.svotc_price_p80_today
            name: P80
            show_state: true
    columns: 1
    square: false
  - type: grid
    cards:
      - type: markdown
        title: SVOTC – MAIN
        content: >-
          {# =========================
             SVOTC 3.0.0 / Core v1
             Safe values - current file set
             Adapted for PI / cheap / price chain
             ========================= #}

          {# Basic status #}

          {% set mode = states('input_select.svotc_mode') %}

          {% set reason = states('input_text.svotc_reason_code') | trim %}

          {% set version =
          state_attr('sensor.svotc_virtual_outdoor_temperature', 'version') %}

          {% set inputs_ok = is_state('binary_sensor.svotc_inputs_healthy',
          'on') %}


          {# Temperature / offset #}

          {% set req = states('input_number.svotc_requested_offset_c') |
          float(0) %}

          {% set app = states('input_number.svotc_applied_offset_c') | float(0)
          %}

          {% set delta = (req - app) | round(2) %}


          {% set indoor_s = states('sensor.svotc_indoor_temperature') %}

          {% set outdoor_s = states('sensor.svotc_outdoor_temperature') %}

          {% set virt_s = states('sensor.svotc_virtual_outdoor_temperature') %}

          {% set target_s = states('input_number.svotc_comfort_temperature') %}


          {% set indoor_ok = indoor_s not in
          ['unknown','unavailable','none','None',''] %}

          {% set outdoor_ok = outdoor_s not in
          ['unknown','unavailable','none','None',''] %}

          {% set virt_ok = virt_s not in
          ['unknown','unavailable','none','None',''] %}

          {% set target_ok = target_s not in
          ['unknown','unavailable','none','None',''] %}


          {% set indoor = indoor_s | float(0) %}

          {% set outdoor = outdoor_s | float(0) %}

          {% set virt = virt_s | float(0) %}

          {% set target = target_s | float(21) %}


          {# Price #}

          {% set price_s = states('sensor.svotc_current_price') %}

          {% set price_ok = price_s not in
          ['unknown','unavailable','none','None',''] %}

          {% set price = price_s | float(0) %}

          {% set forward = states('sensor.svotc_forward_price_state') | trim %}

          {% set price_chain =
          is_state('input_boolean.svotc_price_chain_active', 'on') %}

          {% set cheap_enabled =
          is_state('input_boolean.svotc_cheap_boost_enabled','on') %}

          {% set cheap_offset =
          states('input_number.svotc_cheap_boost_offset_c') | float(0) %}

          {% set brake_hold = states('input_number.svotc_brake_hold_offset_c') |
          float(0) %}

          {% set price_floor = states('input_number.svotc_price_floor_sek') |
          float(0) %}

          {% set p30_s = states('sensor.svotc_price_p30_today') %}

          {% set p80_s = states('sensor.svotc_price_p80_today') %}

          {% set p30_ok = p30_s not in
          ['unknown','unavailable','none','None',''] %}

          {% set p80_ok = p80_s not in
          ['unknown','unavailable','none','None',''] %}


          {# Guard / latches #}

          {% set comfort_latch =
          is_state('input_boolean.svotc_comfort_guard_latch', 'on') %}

          {% set overtemp_latch = is_state('input_boolean.svotc_overtemp_latch',
          'on') %}


          {% set comfort_on_delta =
          states('input_number.svotc_comfort_guard_activate_below_c') |
          float(0.8) %}

          {% set comfort_off_delta =
          states('input_number.svotc_comfort_guard_release_below_c') |
          float(0.4) %}

          {% set over_on_delta =
          states('input_number.svotc_overtemp_brake_activate_above_c') |
          float(0.8) %}

          {% set over_off_delta =
          states('input_number.svotc_overtemp_brake_release_above_c') |
          float(0.4) %}


          {% set comfort_on_at = (target - comfort_on_delta) | round(2) %}

          {% set comfort_off_at = (target - comfort_off_delta) | round(2) %}

          {% set over_on_at = (target + over_on_delta) | round(2) %}

          {% set over_off_at = (target + over_off_delta) | round(2) %}


          {# PI / control analysis #}

          {% set pi_i = states('input_number.svotc_pi_integral_state') |
          float(0) %}

          {% set temp_error = (target - indoor) | round(2) if indoor_ok and
          target_ok else none %}


          {% set control_bucket = 'neutral' %}

          {% if reason in
          ['COMFORT_HEAT','COMFORT_GUARD','CHEAP_PI_HEAT','PRICE_CHEAP_IDLE'] %}
            {% set control_bucket = 'heat' %}
          {% elif reason in
          ['COMFORT_BRAKE','OVERTEMP_PI_BRAKE','PRICE_BRAKE','CHEAP_PI_BRAKE']
          %}
            {% set control_bucket = 'brake' %}
          {% endif %}


          #### 📊 Status Overview


          **Operating mode:** `{{ mode }}`  

          **Strategy:** `{{ reason }}`  

          **System health:** {% if inputs_ok %}✅ OK{% else %}⚠️ PROBLEM{% endif
          %}  

          **Price data:** {% if price_ok %}✅ OK{% else %}⚠️ MISSING{% endif %}  

          **Price phase:** `{% if forward != '' %}{{ forward }}{% else
          %}unknown{% endif %}`  

          **Price chain:** {% if price_chain %}🔗 Active{% else %}⚪ Inactive{%
          endif %}


          ---


          #### 🧠 Summary (why?)


          **Reason:** `{{ reason }}`


          {% if reason == 'PRICE_BRAKE' %}

          🔴 Active price brake. The system holds a positive brake offset
          because the current price is high or an expensive block is
          approaching.  

          - Price: {% if price_ok %}{{ price }}{% else %}—{% endif %} SEK/kWh

          - Forward state: `{{ forward }}`

          - Requested offset: **{{ req | round(2) }}°C**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason in
          ['CHEAP_PI_HEAT','CHEAP_PI_BRAKE','PRICE_CHEAP_IDLE'] %}

          🟢 Cheap/preheat active. Electricity is cheap and the system uses
          cheap logic and/or PI adjustment.  

          - Price: {% if price_ok %}{{ price }}{% else %}—{% endif %} SEK/kWh

          - Cheap boost: {% if cheap_enabled %}On{% else %}Off{% endif %}

          - Cheap offset target: **-{{ cheap_offset | round(2) }}°C**

          - Requested offset: **{{ req | round(2) }}°C**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason == 'COMFORT_HEAT' %}

          🟢 Comfort PI heating. The PI controller is trying to raise the
          temperature toward the setpoint.  

          - Indoor: {% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{% endif
          %}°C

          - Target: {% if target_ok %}{{ target | round(2) }}{% else %}—{% endif
          %}°C

          - Temperature error: {% if temp_error is not none %}{{ temp_error
          }}°C{% else %}—{% endif %}

          - PI integral: **{{ pi_i | round(2) }}**

          - Requested offset: **{{ req | round(2) }}°C**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason == 'COMFORT_BRAKE' %}

          🟠 Comfort PI braking. The PI controller considers the house above
          setpoint and is dampening heat.  

          - Indoor: {% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{% endif
          %}°C

          - Target: {% if target_ok %}{{ target | round(2) }}{% else %}—{% endif
          %}°C

          - Temperature error: {% if temp_error is not none %}{{ temp_error
          }}°C{% else %}—{% endif %}

          - PI integral: **{{ pi_i | round(2) }}**

          - Requested offset: **{{ req | round(2) }}°C**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason == 'COMFORT_IDLE' %}

          ⚪ Comfort mode is near setpoint. The PI controller requires no
          significant heating or braking right now.  

          - Indoor: {% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{% endif
          %}°C

          - Target: {% if target_ok %}{{ target | round(2) }}{% else %}—{% endif
          %}°C

          - Temperature error: {% if temp_error is not none %}{{ temp_error
          }}°C{% else %}—{% endif %}

          - PI integral: **{{ pi_i | round(2) }}**

          - Requested offset: **{{ req | round(2) }}°C**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason == 'COMFORT_SENSOR_MISSING' %}

          ⚠️ Comfort mode cannot PI-control because the indoor temperature is
          missing.


          {% elif reason == 'COMFORT_GUARD' %}

          🛡️ Comfort guard active. Smart mode has switched to heat priority
          because indoor is too cold.  

          - Indoor: {% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{% endif
          %}°C

          - Activates below: **{{ comfort_on_at }}°C**

          - Releases above: **{{ comfort_off_at }}°C**

          - PI integral: **{{ pi_i | round(2) }}**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason == 'OVERTEMP_PI_BRAKE' %}

          🔥 Over-temperature protection with PI brake. The house is too warm
          and the system is actively braking.  

          - Indoor: {% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{% endif
          %}°C

          - Activates above: **{{ over_on_at }}°C**

          - Releases below: **{{ over_off_at }}°C**

          - PI integral: **{{ pi_i | round(2) }}**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason == 'OVERTEMP_STANDBY' %}

          🟠 Over-temperature mode is active but PI requires no actual brake
          right now.  

          - Indoor: {% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{% endif
          %}°C

          - Releases below: **{{ over_off_at }}°C**

          - PI integral: **{{ pi_i | round(2) }}**

          - Applied offset: **{{ app | round(2) }}°C**


          {% elif reason == 'NEUTRAL' %}

          ✅ Neutral operation. Neither price logic, guard nor PI requires any
          significant adjustment.


          {% elif reason == 'OFF' %}

          ⚫ System is off. Offset moves toward 0.


          {% elif reason == 'FAIL_SAFE' %}

          ⚠️ Fail-safe active. Inputs are not healthy and offset is forced
          toward 0.


          {% else %}

          ❓ Unknown strategy: `{{ reason }}`

          {% endif %}


          ---


          #### 🌡️ Temperatures


          | Sensor | Value | Status |

          |--------|-------|--------|

          | 🏠 Indoor | **{% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{%
          endif %}°C** | Target: {% if target_ok %}{{ target | round(2) }}{%
          else %}—{% endif %}°C |

          | 🌡️ Outdoor (actual) | **{% if outdoor_ok %}{{ outdoor | round(2)
          }}{% else %}—{% endif %}°C** | {% if outdoor_ok %}OK{% else %}⚠️
          Missing{% endif %} |

          | 🎯 Virtual (→ HP) | **{% if virt_ok %}{{ virt | round(2) }}{% else
          %}—{% endif %}°C** | Offset: {{ app | round(2) }}°C |


          **Offset status**  

          Requested: **{{ req | round(2) }}°C**  

          Applied: **{{ app | round(2) }}°C**  

          Control type: {% if control_bucket == 'heat' %}🟢 Heat{% elif
          control_bucket == 'brake' %}🟠 Brake{% else %}⚪ Neutral{% endif %}

          {% if delta | abs > 0.05 %}  

          Ramping remaining: **{{ delta }}°C**

          {% endif %}


          ---


          #### 💰 Price Control


          **Current price:** {% if price_ok %}**{{ price | round(4) }}
          SEK/kWh**{% else %}—{% endif %}


          **Price levels today**  

          P30: {% if p30_ok %}{{ p30_s }}{% else %}—{% endif %}  

          P80: {% if p80_ok %}{{ p80_s }}{% else %}—{% endif %}  

          Price floor: {{ price_floor | round(2) }} SEK/kWh


          **Forward price state**  

          {% if forward == 'cheap' %}🟢 Cheap

          {% elif forward == 'prebrake' %}🟠 Prebrake

          {% elif forward == 'brake' %}🔴 Brake

          {% elif forward == 'neutral' %}⚪ Neutral

          {% else %}❓ {{ forward }}

          {% endif %}


          **Cheap boost:** {% if cheap_enabled %}✅ On{% else %}⚪ Off{% endif
          %}  

          **Cheap offset:** -{{ cheap_offset | round(2) }}°C  

          **Brake hold offset:** +{{ brake_hold | round(2) }}°C  

          **Price chain active:** {% if price_chain %}Yes{% else %}No{% endif %}


          ---


          #### 🛡️ Comfort Guard


          **Status:** {% if comfort_latch %}🟢 ACTIVE{% else %}⚪ Standby{% endif
          %}


          **Target:** **{{ target | round(2) }}°C**  

          **Indoor:** **{% if indoor_ok %}{{ indoor | round(2) }}{% else %}—{%
          endif %}°C**


          ❄️ **Activates** if indoor ≤ **{{ comfort_on_at }}°C**  

          🔥 **Releases** if indoor ≥ **{{ comfort_off_at }}°C**


          {% if indoor_ok %}
            {% if comfort_latch %}
              {% set left = (comfort_off_at - indoor) | round(2) %}
              {% if left > 0 %}
          ➡️ Remaining until guard releases: **{{ left }}°C**
              {% else %}
          ➡️ Above release threshold by **{{ (-left) | round(2) }}°C**
              {% endif %}
            {% else %}
              {% set left = (indoor - comfort_on_at) | round(2) %}
              {% if left > 0 %}
          ➡️ Remaining until guard activates: **{{ left }}°C**
              {% else %}
          ➡️ Below activation threshold by **{{ (-left) | round(2) }}°C**
              {% endif %}
            {% endif %}
          {% else %}

          ➡️ Cannot calculate guard distance because indoor temperature is
          missing

          {% endif %}


          ---


          #### 🔥 Over-Temperature Brake


          **Status:** {% if overtemp_latch %}🟠 ACTIVE{% else %}⚪ Standby{%
          endif %}


          🌡️ **Activates** if indoor ≥ **{{ over_on_at }}°C**  

          🧊 **Releases** if indoor ≤ **{{ over_off_at }}°C**


          {% if indoor_ok %}
            {% if overtemp_latch %}
              {% set left = (indoor - over_off_at) | round(2) %}
              {% if left > 0 %}
          ➡️ Remaining until over-brake releases: **{{ left }}°C**
              {% else %}
          ➡️ Below release threshold by **{{ (-left) | round(2) }}°C**
              {% endif %}
            {% else %}
              {% set left = (over_on_at - indoor) | round(2) %}
              {% if left > 0 %}
          ➡️ Remaining until over-brake activates: **{{ left }}°C**
              {% else %}
          ➡️ Above activation threshold by **{{ (-left) | round(2) }}°C**
              {% endif %}
            {% endif %}
          {% else %}

          ➡️ Cannot calculate over-temperature distance because indoor
          temperature is missing

          {% endif %}


          ---


          #### 🧩 Engine Status


          **Requested offset:** `{{
          states('input_number.svotc_requested_offset_c') }}`  

          **Applied offset:** `{{ states('input_number.svotc_applied_offset_c')
          }}`  

          **Reason:** `{{ states('input_text.svotc_reason_code') }}`  

          **Forward price state:** `{{
          states('sensor.svotc_forward_price_state') }}`  

          **PI integral state:** `{{
          states('input_number.svotc_pi_integral_state') }}`


          ---


          *Updated: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}*  

          *Version: {{ version }}*
      - type: custom:mini-graph-card
        name: 🌡️ Temperaturöversikt (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        font_size: 75
        animate: true
        show:
          labels: true
          legend: true
          icon: false
        entities:
          - entity: sensor.svotc_outdoor_temperature
            name: Utomhus (verklig)
            color: "#3498db"
            show_state: true
          - entity: sensor.svotc_virtual_outdoor_temperature
            name: Virtuell ute (→VP)
            color: "#9b59b6"
            show_state: true
badges:
  - type: entity
    entity: person.johan
    show_entity_picture: true
  - type: custom:mushroom-template-badge
    content: Laddbox
    icon: mdi:ev-plug-type2
    color: green
    tap_action:
      action: navigate
      navigation_path: /lovelace/laddbox
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    tap_action:
      action: navigate
      navigation_path: /dashboard-data/7
    entity: sensor.elpris_spot_avgifter
  - type: custom:mushroom-template-badge
    icon: mdi:mushroom
    color: red
    content: Jul
    tap_action:
      action: navigate
      navigation_path: /lovelace/jul
  - type: custom:mushroom-template-badge
    content: Tariff
    icon: mdi:power-plug
    color: blue
    tap_action:
      action: navigate
      navigation_path: /lovelace/9
  - type: custom:mushroom-template-badge
    content: System
    icon: mdi:server
    color: green
    tap_action:
      action: navigate
      navigation_path: /lovelace/system
max_columns: 4
